<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountains — Year 3 Geography | Game Learn</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--accent2:#a78bfa;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
    header{text-align:center;max-width:640px;width:100%}
    .tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
    h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
    .subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}

    /* Mountain profile */
    .profile{position:relative;width:100%;max-width:420px;height:280px;margin:0 auto;background:var(--surface2);border-radius:var(--radius-sm);overflow:hidden}
    .profile svg{position:absolute;bottom:0;width:100%}
    .zone{position:absolute;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:transparent;transition:color .2s}
    .zone.revealed{color:var(--primary);text-shadow:0 1px 3px #000}
    .zone:hover{background:rgba(251,191,36,.08)}

    .label-pool{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-top:.75rem}
    .label-chip{background:var(--accent);color:#0f172a;font-weight:700;border:none;border-radius:10px;padding:.4rem .9rem;font-size:.82rem;cursor:pointer;transition:opacity .15s}
    .label-chip.used{opacity:.3;pointer-events:none}
    .label-chip.sel{outline:3px solid var(--primary)}

    .score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.75rem}.score-bar span{color:var(--primary);font-weight:700}
    .fb{text-align:center;font-size:.88rem;min-height:1.2em;margin-top:.5rem}

    /* Quiz */
    .quiz-area{display:flex;flex-direction:column;gap:1rem}
    .q-text{font-size:.95rem;font-weight:600}
    .opts{display:flex;flex-direction:column;gap:.4rem}
    .opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);text-align:left;transition:background .12s}
    .opt-btn:hover{border-color:var(--accent)}
    .opt-btn.correct{background:var(--success);color:#0f172a;font-weight:700}
    .opt-btn.wrong{background:var(--error);color:#0f172a}
    .opt-btn.disabled{pointer-events:none;opacity:.5}

    @media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  </style>
</head>
<body>
  <header>
    <p class="tag">Year 3 · Geography</p>
    <h1>Mountains</h1>
    <p class="subtitle">Label the mountain zones and take the quiz!</p>
  </header>

  <!-- Mountain Profile Label -->
  <div class="card">
    <p class="card-title">Label the Mountain</p>
    <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:.75rem;">Click a label, then click the correct zone on the mountain.</p>
    <div class="profile" id="profile">
      <svg viewBox="0 0 420 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <polygon points="210,10 50,180 370,180" fill="#475569"/>
        <polygon points="210,10 170,50 250,50" fill="#e2e8f0"/>
      </svg>
      <!-- Zones (top to bottom) -->
      <div class="zone" id="z-summit" style="top:0;height:22%;left:30%;width:40%;" data-label="Summit (snow & ice)">Summit (snow & ice)</div>
      <div class="zone" id="z-treeline" style="top:22%;height:20%;left:18%;width:64%;" data-label="Above treeline (bare rock)">Above treeline (bare rock)</div>
      <div class="zone" id="z-forest" style="top:42%;height:24%;left:10%;width:80%;" data-label="Forest zone (trees)">Forest zone (trees)</div>
      <div class="zone" id="z-valley" style="top:66%;height:34%;left:5%;width:90%;" data-label="Valley (farms & villages)">Valley (farms & villages)</div>
    </div>
    <div class="label-pool" id="labelPool"></div>
    <div class="score-bar">Correct: <span id="lScore">0</span> / 4</div>
    <p class="fb" id="lFb" aria-live="polite"></p>
  </div>

  <!-- Quiz -->
  <div class="card">
    <p class="card-title">Mountain Quiz</p>
    <div class="score-bar">Score: <span id="score">0</span> / <span id="maxS">0</span></div>
    <div class="quiz-area" id="quiz"></div>
    <p class="fb" id="fb" aria-live="polite"></p>
  </div>

  <script>
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    /* ── Label Activity ── */
    const LABELS = ['Summit (snow & ice)','Above treeline (bare rock)','Forest zone (trees)','Valley (farms & villages)'];
    const poolEl = document.getElementById('labelPool');
    const lFb = document.getElementById('lFb');
    const lScEl = document.getElementById('lScore');
    let lSc = 0, selLabel = null;

    shuffle(LABELS).forEach(function(l) {
      const chip = document.createElement('button');
      chip.className = 'label-chip';
      chip.textContent = l;
      chip.addEventListener('click', function() {
        poolEl.querySelectorAll('.label-chip').forEach(function(c) { c.classList.remove('sel'); });
        chip.classList.add('sel');
        selLabel = { text: l, el: chip };
      });
      poolEl.appendChild(chip);
    });

    document.querySelectorAll('.zone').forEach(function(zone) {
      zone.addEventListener('click', function() {
        if (!selLabel) { lFb.textContent = 'Pick a label first!'; lFb.style.color = 'var(--accent)'; return; }
        if (zone.classList.contains('revealed')) return;
        if (selLabel.text === zone.dataset.label) {
          zone.classList.add('revealed','bounce');
          selLabel.el.classList.add('used');
          lSc++; lScEl.textContent = lSc;
          lFb.textContent = '\u2713 ' + selLabel.text + ' — correct!';
          lFb.style.color = 'var(--success)';
          selLabel = null;
        } else {
          lFb.textContent = '\u2717 That zone is not the ' + selLabel.text.toLowerCase() + '. Try again!';
          lFb.style.color = 'var(--error)';
        }
      });
    });

    /* ── Quiz ── */
    const QUESTIONS = [
      { q:"What is the tallest mountain on Earth?", a:"Mount Everest (8,849 m)", d:["Ben Nevis","Mount Fuji","K2"] },
      { q:"How are fold mountains formed?", a:"Tectonic plates push together and crumple land up", d:["Volcanoes erupt","Rivers erode rock","Wind blows sand"] },
      { q:"What happens to temperature as you climb higher?", a:"It gets colder (about 1°C per 150 m)", d:["It gets warmer","It stays the same","It gets windier but not colder"] },
      { q:"What is the longest mountain range in the world?", a:"The Andes", d:["The Himalayas","The Alps","The Rockies"] },
      { q:"What is the tallest mountain in the UK?", a:"Ben Nevis", d:["Snowdon","Scafell Pike","Mount Everest"] },
      { q:"What is a summit?", a:"The very top of a mountain", d:["The bottom of a mountain","A type of rock","A mountain animal"] }
    ];

    let sc=0,qi=0;
    const qs=shuffle(QUESTIONS).slice(0,5);
    const quizEl=document.getElementById('quiz');
    const fbEl=document.getElementById('fb');
    const scEl=document.getElementById('score');
    document.getElementById('maxS').textContent=qs.length;

    function renderQ(){
      if(qi>=qs.length){quizEl.innerHTML='';const p=document.createElement('p');p.className='q-text';p.style.cssText='color:var(--primary);text-align:center;';p.textContent='Peak performance! '+sc+' / '+qs.length+'!';quizEl.appendChild(p);fbEl.textContent='';return;}
      const q=qs[qi];const opts=shuffle([q.a,...q.d]);quizEl.innerHTML='';fbEl.textContent='';
      const qt=document.createElement('p');qt.className='q-text';qt.textContent=(qi+1)+'. '+q.q;quizEl.appendChild(qt);
      const od=document.createElement('div');od.className='opts';
      opts.forEach(function(o){const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
        btn.addEventListener('click',function(){od.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');});
        if(o===q.a){btn.classList.add('correct','bounce');sc++;scEl.textContent=sc;fbEl.textContent='\u2713 Correct!';fbEl.style.color='var(--success)';}
        else{btn.classList.add('wrong','shake');od.querySelectorAll('.opt-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');});fbEl.textContent='\u2717 Answer: '+q.a;fbEl.style.color='var(--error)';}
        qi++;setTimeout(renderQ,1100);});od.appendChild(btn);});quizEl.appendChild(od);
    }
    renderQ();
  </script>
</body>
</html>
