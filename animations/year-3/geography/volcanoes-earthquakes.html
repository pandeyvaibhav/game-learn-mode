<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volcanoes and Earthquakes — Year 3 Geography | Game Learn</title>
  <style>
    /* ── Child Baseline (animations/_shared/child-baseline.css) ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--accent2:#a78bfa;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px;--tap-min:44px;--tap-primary:56px;--tap-gap:12px;--child-font-base:18px;--child-font-prompt:20px;--child-font-answer:22px;--radius-child:16px}
    html{font-size:100%}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem;font-size:var(--child-font-base);line-height:1.55;-webkit-text-size-adjust:100%;text-size-adjust:100%}
    button,[role="button"],a.btn,.tap,[tabindex]:not([tabindex="-1"]),input[type="button"],input[type="submit"]{min-height:var(--tap-min);min-width:var(--tap-min);padding:.65rem 1rem;font-size:var(--child-font-answer);border-radius:var(--radius-child);touch-action:manipulation}
    .primary-tap,button.primary,[role="button"].primary{min-height:var(--tap-primary);min-width:var(--tap-primary);font-size:var(--child-font-answer);font-weight:700}
    :focus-visible{outline:3px solid #ffd166;outline-offset:3px;border-radius:var(--radius-child)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
    p,li,label,.prompt,.instruction{font-size:var(--child-font-prompt);line-height:1.55;max-width:42ch}
    img,svg,canvas{max-width:100%;height:auto}
    html,body{overflow-x:hidden}
    header{text-align:center;max-width:640px;width:100%}
    .tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
    h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
    .subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}

    /* Cross-section diagram */
    .diagram{position:relative;width:100%;max-width:400px;margin:0 auto}
    .diagram svg{width:100%;height:auto}
    .label-zone{position:absolute;border:2px dashed transparent;border-radius:6px;cursor:pointer;transition:border-color .2s}
    .label-zone:hover{border-color:var(--accent)}
    .label-zone.filled{border-color:var(--success);background:rgba(52,211,153,.1)}
    .label-zone.wrong-zone{border-color:var(--error)}

    .label-pool{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-top:1rem}
    .label-chip{background:var(--accent);color:#0f172a;font-weight:700;border:none;border-radius:10px;padding:.4rem .9rem;font-size:.82rem;cursor:pointer;transition:opacity .15s}
    .label-chip.used{opacity:.3;pointer-events:none}
    .label-chip.sel{outline:3px solid var(--primary)}

    .score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.75rem}.score-bar span{color:var(--primary);font-weight:700}
    .fb{text-align:center;font-size:.88rem;min-height:1.2em;margin-top:.5rem}

    /* Quiz */
    .quiz-area{display:flex;flex-direction:column;gap:1rem}
    .q-text{font-size:.95rem;font-weight:600}
    .opts{display:flex;flex-direction:column;gap:.4rem}
    .opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);text-align:left;transition:background .12s}
    .opt-btn:hover{border-color:var(--accent)}
    .opt-btn.correct{background:var(--success);color:#0f172a;font-weight:700}
    .opt-btn.wrong{background:var(--error);color:#0f172a}
    .opt-btn.disabled{pointer-events:none;opacity:.5}

    @media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  </style>
</head>
<body>
  <header>
    <p class="tag">Year 3 · Geography</p>
    <h1>Volcanoes and Earthquakes</h1>
    <p class="subtitle">Label the Earth's layers and test your knowledge!</p>
  </header>

  <!-- Earth Layers Label Activity -->
  <div class="card">
    <p class="card-title">Label the Earth</p>
    <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:.75rem;">Click a label, then click the correct layer on the diagram.</p>
    <div class="diagram" id="diagram">
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <!-- Inner core -->
        <circle cx="150" cy="150" r="30" fill="#e74c3c"/>
        <!-- Outer core -->
        <circle cx="150" cy="150" r="70" fill="#f39c12" style="opacity:.7"/>
        <circle cx="150" cy="150" r="30" fill="#e74c3c"/>
        <!-- Mantle -->
        <circle cx="150" cy="150" r="120" fill="#e67e22" style="opacity:.5"/>
        <circle cx="150" cy="150" r="70" fill="#f39c12" style="opacity:.7"/>
        <circle cx="150" cy="150" r="30" fill="#e74c3c"/>
        <!-- Crust -->
        <circle cx="150" cy="150" r="140" fill="#8b6914" style="opacity:.4"/>
        <circle cx="150" cy="150" r="120" fill="#e67e22" style="opacity:.5"/>
        <circle cx="150" cy="150" r="70" fill="#f39c12" style="opacity:.7"/>
        <circle cx="150" cy="150" r="30" fill="#e74c3c"/>
      </svg>
      <!-- Clickable zones -->
      <div class="label-zone" id="zone-crust" style="top:2%;left:2%;width:96%;height:96%;border-radius:50%" data-layer="Crust"></div>
      <div class="label-zone" id="zone-mantle" style="top:10%;left:10%;width:80%;height:80%;border-radius:50%" data-layer="Mantle"></div>
      <div class="label-zone" id="zone-outer" style="top:27%;left:27%;width:46%;height:46%;border-radius:50%" data-layer="Outer Core"></div>
      <div class="label-zone" id="zone-inner" style="top:40%;left:40%;width:20%;height:20%;border-radius:50%" data-layer="Inner Core"></div>
    </div>
    <div class="label-pool" id="labelPool"></div>
    <div class="score-bar">Correct: <span id="lScore">0</span> / 4</div>
    <p class="fb" id="lFb" aria-live="polite"></p>
  </div>

  <!-- Quiz -->
  <div class="card">
    <p class="card-title">Volcano & Earthquake Quiz</p>
    <div class="score-bar">Score: <span id="score">0</span> / <span id="maxS">0</span></div>
    <div class="quiz-area" id="quiz"></div>
    <p class="fb" id="fb" aria-live="polite"></p>
  </div>

  <script>
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    /* ── Label Activity ── */
    const LAYERS = ['Crust','Mantle','Outer Core','Inner Core'];
    const poolEl = document.getElementById('labelPool');
    const lFb = document.getElementById('lFb');
    const lScEl = document.getElementById('lScore');
    let lSc = 0;
    let selLabel = null;

    shuffle(LAYERS).forEach(function(l) {
      const chip = document.createElement('button');
      chip.className = 'label-chip';
      chip.textContent = l;
      chip.addEventListener('click', function() {
        poolEl.querySelectorAll('.label-chip').forEach(function(c) { c.classList.remove('sel'); });
        chip.classList.add('sel');
        selLabel = { text: l, el: chip };
      });
      poolEl.appendChild(chip);
    });

    document.querySelectorAll('.label-zone').forEach(function(zone) {
      zone.addEventListener('click', function(e) {
        e.stopPropagation();
        if (!selLabel) { lFb.textContent = 'Pick a label first!'; lFb.style.color = 'var(--accent)'; return; }
        if (zone.classList.contains('filled')) return;
        if (selLabel.text === zone.dataset.layer) {
          zone.classList.add('filled');
          selLabel.el.classList.add('used');
          lSc++; lScEl.textContent = lSc;
          lFb.textContent = '\u2713 ' + selLabel.text + ' — correct!';
          lFb.style.color = 'var(--success)';
          // Add label text
          const tag = document.createElement('div');
          tag.style.cssText = 'position:absolute;color:var(--primary);font-size:.78rem;font-weight:700;pointer-events:none;text-shadow:0 1px 3px #000;';
          if (selLabel.text === 'Inner Core') { tag.style.top = '46%'; tag.style.left = '39%'; }
          else if (selLabel.text === 'Outer Core') { tag.style.top = '30%'; tag.style.left = '35%'; }
          else if (selLabel.text === 'Mantle') { tag.style.top = '15%'; tag.style.left = '38%'; }
          else { tag.style.top = '4%'; tag.style.left = '42%'; }
          tag.textContent = selLabel.text;
          document.getElementById('diagram').appendChild(tag);
          selLabel = null;
        } else {
          zone.classList.add('wrong-zone');
          setTimeout(function() { zone.classList.remove('wrong-zone'); }, 500);
          lFb.textContent = '\u2717 That\'s not the ' + selLabel.text + '. Try another layer!';
          lFb.style.color = 'var(--error)';
        }
      });
    });

    /* ── Quiz ── */
    const QUESTIONS = [
      { q:"What is lava?", a:"Magma that has reached the Earth's surface", d:["A type of earthquake","Cold water underground","A volcanic rock"] },
      { q:"Where are 75% of the world's volcanoes found?", a:"The Ring of Fire (around the Pacific)", d:["The North Pole","In Africa","Under the Atlantic Ocean"] },
      { q:"What buried Pompeii in AD 79?", a:"Mount Vesuvius erupted", d:["A flood","An earthquake only","A tsunami"] },
      { q:"What causes earthquakes?", a:"Tectonic plates suddenly slipping", d:["Wind blowing hard","Rain underground","Volcanoes always"] },
      { q:"What is the epicentre of an earthquake?", a:"The point on the surface above where it starts", d:["The deepest part of the ocean","The middle of a volcano","A city in Japan"] },
      { q:"What is the Earth's crust?", a:"The thin, rocky outer layer", d:["The hot liquid centre","The layer of clouds","The Earth's atmosphere"] }
    ];

    let sc=0,qi=0;
    const qs=shuffle(QUESTIONS).slice(0,5);
    const quizEl=document.getElementById('quiz');
    const fbEl=document.getElementById('fb');
    const scEl=document.getElementById('score');
    document.getElementById('maxS').textContent=qs.length;

    function renderQ(){
      if(qi>=qs.length){quizEl.innerHTML='';const p=document.createElement('p');p.className='q-text';p.style.cssText='color:var(--primary);text-align:center;';p.textContent='Seismic score! '+sc+' / '+qs.length+'!';quizEl.appendChild(p);fbEl.textContent='';return;}
      const q=qs[qi];const opts=shuffle([q.a,...q.d]);quizEl.innerHTML='';fbEl.textContent='';
      const qt=document.createElement('p');qt.className='q-text';qt.textContent=(qi+1)+'. '+q.q;quizEl.appendChild(qt);
      const od=document.createElement('div');od.className='opts';
      opts.forEach(function(o){const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
        btn.addEventListener('click',function(){od.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');});
        if(o===q.a){btn.classList.add('correct','bounce');sc++;scEl.textContent=sc;fbEl.textContent='\u2713 Correct!';fbEl.style.color='var(--success)';}
        else{btn.classList.add('wrong','shake');od.querySelectorAll('.opt-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');});fbEl.textContent='\u2717 Answer: '+q.a;fbEl.style.color='var(--error)';}
        qi++;setTimeout(renderQ,1100);});od.appendChild(btn);});quizEl.appendChild(od);
    }
    renderQ();
  </script>
</body>
</html>
