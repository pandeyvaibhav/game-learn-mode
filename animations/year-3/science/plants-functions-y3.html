<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plants Functions — Year 3 Science | Game Learn</title>
  <style>
    /* ── Child Baseline (animations/_shared/child-baseline.css) ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--accent2:#a78bfa;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px;--tap-min:44px;--tap-primary:56px;--tap-gap:12px;--child-font-base:18px;--child-font-prompt:20px;--child-font-answer:22px;--radius-child:16px}
    html{font-size:100%}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem;font-size:var(--child-font-base);line-height:1.55;-webkit-text-size-adjust:100%;text-size-adjust:100%}
    button,[role="button"],a.btn,.tap,[tabindex]:not([tabindex="-1"]),input[type="button"],input[type="submit"]{min-height:var(--tap-min);min-width:var(--tap-min);padding:.65rem 1rem;font-size:var(--child-font-answer);border-radius:var(--radius-child);touch-action:manipulation}
    .primary-tap,button.primary,[role="button"].primary{min-height:var(--tap-primary);min-width:var(--tap-primary);font-size:var(--child-font-answer);font-weight:700}
    :focus-visible{outline:3px solid #ffd166;outline-offset:3px;border-radius:var(--radius-child)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
    p,li,label,.prompt,.instruction{font-size:var(--child-font-prompt);line-height:1.55;max-width:42ch}
    img,svg,canvas{max-width:100%;height:auto}
    html,body{overflow-x:hidden}
    header{text-align:center;max-width:640px;width:100%}
    .tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
    h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
    .subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}

    /* Lifecycle */
    .lifecycle{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center}
    .stage{background:var(--surface2);border:2px solid var(--border);border-radius:12px;width:90px;height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.78rem;text-align:center;cursor:pointer;transition:border-color .2s,transform .2s}
    .stage:hover{transform:scale(1.06)}
    .stage.active{border-color:var(--primary)}
    .stage-icon{font-size:1.5rem;margin-bottom:.2rem}
    .stage-info{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;font-size:.88rem;line-height:1.5;min-height:50px;margin-top:.75rem}

    /* Seed Dispersal Sorting */
    .disp-items{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1rem}
    .disp-chip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.45rem .9rem;font-size:.85rem;cursor:pointer;transition:background .12s}
    .disp-chip:hover{border-color:var(--accent)}
    .disp-chip.correct{background:var(--success);color:#0f172a;font-weight:700;pointer-events:none}
    .disp-chip.wrong{background:var(--error);color:#0f172a;pointer-events:none}
    .method-btns{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:.75rem}
    .method-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem .9rem;font-size:.82rem;cursor:pointer;color:var(--text)}
    .method-btn:hover{border-color:var(--accent)}
    .method-btn.sel{border-color:var(--primary);background:var(--primary);color:#0f172a;font-weight:700}
    .score-bar{text-align:center;font-size:.9rem;color:var(--text-muted)}.score-bar span{color:var(--primary);font-weight:700}

    /* Quiz */
    .quiz-area{display:flex;flex-direction:column;gap:1rem}
    .q-text{font-size:.95rem;font-weight:600}
    .opts{display:flex;flex-direction:column;gap:.4rem}
    .opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);text-align:left;transition:background .12s}
    .opt-btn:hover{border-color:var(--accent)}
    .opt-btn.correct{background:var(--success);color:#0f172a;font-weight:700}
    .opt-btn.wrong{background:var(--error);color:#0f172a}
    .opt-btn.disabled{pointer-events:none;opacity:.5}
    .fb{text-align:center;font-size:.88rem;min-height:1.2em;margin-top:.5rem}

    @media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  </style>
</head>
<body>
  <header>
    <p class="tag">Year 3 · Science</p>
    <h1>Plants Functions</h1>
    <p class="subtitle">Explore the plant lifecycle and how seeds travel!</p>
  </header>

  <!-- Plant Lifecycle Explorer -->
  <div class="card">
    <p class="card-title">Plant Lifecycle Explorer</p>
    <div class="lifecycle" id="lifecycle"></div>
    <div class="stage-info" id="stageInfo" aria-live="polite">Click a stage to learn about it!</div>
  </div>

  <!-- Seed Dispersal Activity -->
  <div class="card">
    <p class="card-title">Seed Dispersal Sorting</p>
    <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:.75rem;">First pick a dispersal method, then click the seeds that travel that way.</p>
    <div class="method-btns" id="methodBtns"></div>
    <div class="disp-items" id="dispItems"></div>
    <div class="score-bar">Correct: <span id="dispScore">0</span> / <span id="dispMax">0</span></div>
    <p class="fb" id="dispFb" aria-live="polite"></p>
  </div>

  <!-- Quiz -->
  <div class="card">
    <p class="card-title">Plants Quiz</p>
    <div class="score-bar">Score: <span id="score">0</span> / <span id="maxS">0</span></div>
    <div class="quiz-area" id="quiz"></div>
    <p class="fb" id="fb" aria-live="polite"></p>
  </div>

  <script>
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    /* ── Lifecycle Explorer ── */
    const STAGES = [
      { icon:'🌰', name:'Seed', desc:'A tiny package with a baby plant and stored food inside, waiting for the right conditions to grow.' },
      { icon:'🌱', name:'Germination', desc:'The seed absorbs water and swells. A root pushes down into the soil and a shoot pushes up towards the light.' },
      { icon:'🪴', name:'Growth', desc:'The stem grows taller, leaves spread out and start photosynthesis — making food from sunlight, water and CO₂.' },
      { icon:'🌸', name:'Flowering', desc:'The plant produces flowers. Bright petals and sweet nectar attract bees and butterflies for pollination.' },
      { icon:'🐝', name:'Pollination', desc:'Pollen travels from one flower to another (by insects or wind). This allows seeds to develop.' },
      { icon:'💨', name:'Seed Dispersal', desc:'Seeds spread away from the parent plant by wind, animals, water, or explosion — and the cycle begins again!' }
    ];
    const lcEl = document.getElementById('lifecycle');
    const infoEl = document.getElementById('stageInfo');
    STAGES.forEach(function(s, i) {
      const div = document.createElement('div');
      div.className = 'stage';
      div.innerHTML = '<span class="stage-icon">' + s.icon + '</span>' + s.name;
      div.addEventListener('click', function() {
        lcEl.querySelectorAll('.stage').forEach(function(el) { el.classList.remove('active'); });
        div.classList.add('active');
        infoEl.innerHTML = '<strong style="color:var(--primary);">' + s.icon + ' ' + s.name + '</strong><br>' + s.desc;
      });
      lcEl.appendChild(div);
    });

    /* ── Seed Dispersal Sorting ── */
    const SEEDS = [
      { name:'Dandelion', method:'Wind' },
      { name:'Sycamore', method:'Wind' },
      { name:'Coconut', method:'Water' },
      { name:'Burdock', method:'Animal' },
      { name:'Strawberry', method:'Animal' },
      { name:'Pea pod', method:'Explosion' },
      { name:'Poppy', method:'Wind' },
      { name:'Blackberry', method:'Animal' }
    ];
    const METHODS = ['Wind','Animal','Water','Explosion'];
    let selMethod = null;
    let dispSc = 0;
    const dispTotal = SEEDS.length;
    document.getElementById('dispMax').textContent = dispTotal;
    const mbEl = document.getElementById('methodBtns');
    const diEl = document.getElementById('dispItems');
    const dfEl = document.getElementById('dispFb');
    const dsEl = document.getElementById('dispScore');

    METHODS.forEach(function(m) {
      const btn = document.createElement('button');
      btn.className = 'method-btn';
      btn.textContent = m;
      btn.addEventListener('click', function() {
        mbEl.querySelectorAll('.method-btn').forEach(function(b) { b.classList.remove('sel'); });
        btn.classList.add('sel');
        selMethod = m;
        dfEl.textContent = 'Now click seeds that travel by ' + m.toLowerCase() + '.';
        dfEl.style.color = 'var(--accent)';
      });
      mbEl.appendChild(btn);
    });

    shuffle(SEEDS).forEach(function(seed) {
      const chip = document.createElement('button');
      chip.className = 'disp-chip';
      chip.textContent = seed.name;
      chip.addEventListener('click', function() {
        if (!selMethod) { dfEl.textContent = 'Pick a method first!'; dfEl.style.color = 'var(--error)'; return; }
        if (seed.method === selMethod) {
          chip.classList.add('correct','bounce');
          dispSc++; dsEl.textContent = dispSc;
          dfEl.textContent = '\u2713 ' + seed.name + ' seeds travel by ' + seed.method.toLowerCase() + '!';
          dfEl.style.color = 'var(--success)';
        } else {
          chip.classList.add('wrong','shake');
          dfEl.textContent = '\u2717 ' + seed.name + ' actually travels by ' + seed.method.toLowerCase() + '.';
          dfEl.style.color = 'var(--error)';
        }
      });
      diEl.appendChild(chip);
    });

    /* ── Quiz ── */
    const QUESTIONS = [
      { q:"What gas do leaves take in during photosynthesis?", a:"Carbon dioxide", d:["Oxygen","Nitrogen","Hydrogen"] },
      { q:"Which part of the plant anchors it in the soil?", a:"Roots", d:["Leaves","Petals","Stem"] },
      { q:"What do insects help flowers do?", a:"Pollination", d:["Photosynthesis","Grow taller","Take in water"] },
      { q:"Dandelion seeds travel by:", a:"Wind", d:["Water","Explosion","Rolling along the ground"] },
      { q:"Plants need sunlight, water, and ___ for photosynthesis.", a:"Carbon dioxide", d:["Soil","Oxygen","Sugar"] }
    ];

    let sc=0,qi=0;
    const qs=shuffle(QUESTIONS).slice(0,5);
    const quizEl=document.getElementById('quiz');
    const fbEl=document.getElementById('fb');
    const scEl=document.getElementById('score');
    document.getElementById('maxS').textContent=qs.length;

    function renderQ(){
      if(qi>=qs.length){quizEl.innerHTML='';const p=document.createElement('p');p.className='q-text';p.style.cssText='color:var(--primary);text-align:center;';p.textContent='Brilliant! '+sc+' / '+qs.length+'!';quizEl.appendChild(p);fbEl.textContent='';return;}
      const q=qs[qi];const opts=shuffle([q.a,...q.d]);quizEl.innerHTML='';fbEl.textContent='';
      const qt=document.createElement('p');qt.className='q-text';qt.textContent=(qi+1)+'. '+q.q;quizEl.appendChild(qt);
      const od=document.createElement('div');od.className='opts';
      opts.forEach(function(o){const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
        btn.addEventListener('click',function(){od.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');});
        if(o===q.a){btn.classList.add('correct','bounce');sc++;scEl.textContent=sc;fbEl.textContent='\u2713 Correct!';fbEl.style.color='var(--success)';}
        else{btn.classList.add('wrong','shake');od.querySelectorAll('.opt-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');});fbEl.textContent='\u2717 Answer: '+q.a;fbEl.style.color='var(--error)';}
        qi++;setTimeout(renderQ,1100);});od.appendChild(btn);});quizEl.appendChild(od);
    }
    renderQ();
  </script>
</body>
</html>
