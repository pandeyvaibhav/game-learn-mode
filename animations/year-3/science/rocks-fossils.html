<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocks and Fossils — Year 3 Science | Game Learn</title>
  <style>
    /* ── Child Baseline (animations/_shared/child-baseline.css) ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--accent2:#a78bfa;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px;--tap-min:44px;--tap-primary:56px;--tap-gap:12px;--child-font-base:18px;--child-font-prompt:20px;--child-font-answer:22px;--radius-child:16px}
    html{font-size:100%}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem;font-size:var(--child-font-base);line-height:1.55;-webkit-text-size-adjust:100%;text-size-adjust:100%}
    button,[role="button"],a.btn,.tap,[tabindex]:not([tabindex="-1"]),input[type="button"],input[type="submit"]{min-height:var(--tap-min);min-width:var(--tap-min);padding:.65rem 1rem;font-size:var(--child-font-answer);border-radius:var(--radius-child);touch-action:manipulation}
    .primary-tap,button.primary,[role="button"].primary{min-height:var(--tap-primary);min-width:var(--tap-primary);font-size:var(--child-font-answer);font-weight:700}
    :focus-visible{outline:3px solid #ffd166;outline-offset:3px;border-radius:var(--radius-child)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
    p,li,label,.prompt,.instruction{font-size:var(--child-font-prompt);line-height:1.55;max-width:42ch}
    img,svg,canvas{max-width:100%;height:auto}
    html,body{overflow-x:hidden}
    header{text-align:center;max-width:640px;width:100%}
    .tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
    h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
    .subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}

    /* Rock Cycle Spinner */
    .cycle{display:flex;flex-direction:column;align-items:center;gap:1rem}
    .cycle-ring{position:relative;width:280px;height:280px}
    .rock-node{position:absolute;width:100px;text-align:center;cursor:pointer;transition:transform .2s}
    .rock-node:hover{transform:scale(1.08)}
    .rock-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto .3rem;border:3px solid var(--border);transition:border-color .2s}
    .rock-node.active .rock-icon{border-color:var(--primary)}
    .rock-name{font-size:.82rem;font-weight:700;color:var(--accent)}
    .rock-info{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;font-size:.88rem;line-height:1.5;min-height:70px}

    /* Quiz */
    .quiz-area{display:flex;flex-direction:column;gap:1rem}
    .q-text{font-size:.95rem;font-weight:600}
    .opts{display:flex;flex-direction:column;gap:.4rem}
    .opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);text-align:left;transition:background .12s}
    .opt-btn:hover{border-color:var(--accent)}
    .opt-btn.correct{background:var(--success);color:#0f172a;font-weight:700}
    .opt-btn.wrong{background:var(--error);color:#0f172a}
    .opt-btn.disabled{pointer-events:none;opacity:.5}
    .fb{text-align:center;font-size:.88rem;min-height:1.2em;margin-top:.5rem}
    .score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-bottom:.5rem}.score-bar span{color:var(--primary);font-weight:700}

    @media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  </style>
</head>
<body>
  <header>
    <p class="tag">Year 3 · Science</p>
    <h1>Rocks and Fossils</h1>
    <p class="subtitle">Explore the rock cycle and test your knowledge!</p>
  </header>

  <!-- Rock Cycle -->
  <div class="card">
    <p class="card-title">Rock Cycle Explorer</p>
    <div class="cycle">
      <div class="cycle-ring" id="cycleRing">
        <div class="rock-node" data-rock="igneous" style="top:0;left:90px;">
          <div class="rock-icon" style="background:#e74c3c22;">🌋</div>
          <div class="rock-name">Igneous</div>
        </div>
        <div class="rock-node" data-rock="sedimentary" style="bottom:0;left:0;">
          <div class="rock-icon" style="background:#f39c1222;">🏖️</div>
          <div class="rock-name">Sedimentary</div>
        </div>
        <div class="rock-node" data-rock="metamorphic" style="bottom:0;right:0;">
          <div class="rock-icon" style="background:#9b59b622;">💎</div>
          <div class="rock-name">Metamorphic</div>
        </div>
      </div>
      <div class="rock-info" id="rockInfo" aria-live="polite">Click a rock type to learn more!</div>
    </div>
  </div>

  <!-- Quiz -->
  <div class="card">
    <p class="card-title">Rock Quiz</p>
    <div class="score-bar">Score: <span id="score">0</span> / <span id="maxS">0</span></div>
    <div class="quiz-area" id="quiz"></div>
    <p class="fb" id="fb" aria-live="polite"></p>
  </div>

  <script>
    /* ── Rock Cycle Explorer ── */
    const ROCK_DATA = {
      igneous: { title:'Igneous Rock', desc:'Formed when hot magma or lava cools and hardens. Examples: granite (cooled slowly, big crystals) and basalt (cooled quickly, small crystals). Igneous means "made by fire"!' },
      sedimentary: { title:'Sedimentary Rock', desc:'Formed when layers of sediment (sand, mud, shells) are squashed together over millions of years. Examples: limestone, sandstone, chalk. This is where fossils are found!' },
      metamorphic: { title:'Metamorphic Rock', desc:'Formed when existing rocks are changed by extreme heat and pressure underground. Examples: marble (from limestone) and slate (from mudstone). "Metamorphic" means "changed form"!' }
    };

    const infoEl = document.getElementById('rockInfo');
    document.getElementById('cycleRing').addEventListener('click', function(e) {
      const node = e.target.closest('.rock-node');
      if (!node) return;
      const rock = node.dataset.rock;
      const data = ROCK_DATA[rock];
      document.querySelectorAll('.rock-node').forEach(function(n) { n.classList.remove('active'); });
      node.classList.add('active');
      infoEl.innerHTML = '<strong style="color:var(--primary);">' + data.title + '</strong><br>' + data.desc;
    });

    /* ── Quiz ── */
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    const QUESTIONS = [
      { q:"Granite is an example of which type of rock?", a:"Igneous", d:["Sedimentary","Metamorphic","Fossil"] },
      { q:"Where are fossils most likely to be found?", a:"Sedimentary rock", d:["Igneous rock","Metamorphic rock","In lava"] },
      { q:"What is magma?", a:"Hot melted rock under the Earth's surface", d:["Cold ocean water","A type of fossil","A layer of soil"] },
      { q:"Marble is formed from limestone by:", a:"Heat and pressure", d:["Cooling lava","Layers of sediment","Water erosion"] },
      { q:"What are the tiny pieces of rock carried by water called?", a:"Sediment", d:["Magma","Crystals","Lava"] },
      { q:"Which rock type has layers?", a:"Sedimentary", d:["Igneous","Metamorphic","All rocks"] }
    ];

    let sc = 0, qi = 0;
    const qs = shuffle(QUESTIONS).slice(0,5);
    const quizEl = document.getElementById('quiz');
    const fbEl = document.getElementById('fb');
    const scEl = document.getElementById('score');
    document.getElementById('maxS').textContent = qs.length;

    function renderQ() {
      if (qi >= qs.length) { quizEl.innerHTML = ''; const p = document.createElement('p'); p.className = 'q-text'; p.style.cssText = 'color:var(--primary);text-align:center;'; p.textContent = 'Rock star! ' + sc + ' / ' + qs.length + '!'; quizEl.appendChild(p); fbEl.textContent = ''; return; }
      const q = qs[qi]; const opts = shuffle([q.a, ...q.d]); quizEl.innerHTML = ''; fbEl.textContent = '';
      const qt = document.createElement('p'); qt.className = 'q-text'; qt.textContent = (qi+1) + '. ' + q.q; quizEl.appendChild(qt);
      const od = document.createElement('div'); od.className = 'opts';
      opts.forEach(function(o) {
        const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.textContent = o;
        btn.addEventListener('click', function() {
          od.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');});
          if(o===q.a){btn.classList.add('correct','bounce');sc++;scEl.textContent=sc;fbEl.textContent='\u2713 Correct!';fbEl.style.color='var(--success)';}
          else{btn.classList.add('wrong','shake');od.querySelectorAll('.opt-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');});fbEl.textContent='\u2717 Answer: '+q.a;fbEl.style.color='var(--error)';}
          qi++;setTimeout(renderQ,1100);
        }); od.appendChild(btn);
      }); quizEl.appendChild(od);
    }
    renderQ();
  </script>
</body>
</html>
