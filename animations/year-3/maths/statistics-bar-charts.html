<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistics — Bar Charts — Quiz Game</title>
<style>
  :root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--primary:#818cf8;--accent:#38bdf8;--success:#4ade80;--error:#f87171;--text:#f1f5f9;--text-muted:#94a3b8;--tap-min:44px;--tap-primary:56px;--child-font-base:18px;--radius:12px;font-family:system-ui,-apple-system,sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-size:var(--child-font-base);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem;}
  h1{font-size:1.5rem;margin-bottom:.5rem;text-align:center;}.subtitle{color:var(--text-muted);margin-bottom:1.5rem;text-align:center;}
  .score-bar{display:flex;gap:1.5rem;margin-bottom:1.5rem;font-weight:600;}.score-bar span{padding:.4rem .8rem;background:var(--surface);border-radius:var(--radius);}
  .question-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:560px;text-align:center;margin-bottom:1rem;}
  .q-text{font-size:1.1rem;margin-bottom:1rem;}
  .chart{display:flex;align-items:flex-end;justify-content:center;gap:.6rem;height:160px;margin-bottom:.5rem;padding:0 .5rem;}
  .bar-group{display:flex;flex-direction:column;align-items:center;}.bar{width:44px;border-radius:6px 6px 0 0;transition:height .3s;}.bar-label{margin-top:.3rem;font-size:.85rem;color:var(--text-muted);}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
  .options button{min-height:var(--tap-primary);font-size:1.1rem;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);cursor:pointer;transition:.15s;font-family:inherit;}
  .options button:hover,.options button:focus-visible{border-color:var(--primary);outline:none;}
  .options button.correct{border-color:var(--success);background:#166534;}.options button.wrong{border-color:var(--error);background:#7f1d1d;}
  .options button:disabled{cursor:default;opacity:.85;}.feedback{min-height:2rem;margin-top:1rem;font-weight:600;}
  .next-btn{margin-top:1rem;min-height:var(--tap-primary);padding:0 2rem;font-size:1.1rem;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;display:none;}.next-btn:hover{filter:brightness(1.15);}
  .result{text-align:center;}.result h2{font-size:1.8rem;margin-bottom:.5rem;}.result .star{font-size:3rem;}
  .restart-btn{margin-top:1rem;min-height:var(--tap-primary);padding:0 2rem;font-size:1.1rem;border:none;border-radius:var(--radius);background:var(--accent);color:#0f172a;cursor:pointer;font-weight:600;font-family:inherit;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<h1>Statistics — Bar Charts</h1>
<p class="subtitle">Year 3 Maths — Quiz Game</p>
<div class="score-bar"><span id="scoreEl">Score: 0</span><span id="qNum">1 / 10</span></div>
<div class="question-area" id="questionArea">
  <div class="chart" id="chart"></div>
  <p class="q-text" id="qText"></p>
  <div class="options" id="opts"></div>
  <p class="feedback" id="feedback"></p>
  <button class="next-btn" id="nextBtn">Next →</button>
</div>
<div class="result" id="result" style="display:none"></div>
<script>
(function(){
  function r(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=r(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
  const colors=['#818cf8','#38bdf8','#4ade80','#fbbf24','#f87171'];
  const themes=[{title:'Favourite Fruits',labels:['Apple','Banana','Orange','Grape']},{title:'Favourite Pets',labels:['Dog','Cat','Fish','Rabbit']},{title:'Favourite Sports',labels:['Football','Swimming','Tennis','Running']},{title:'Books Read',labels:['Asha','Ben','Cara','Dev']}];
  const qs=[];
  for(let t=0;t<4;t++){
    const th=themes[t%themes.length];const vals=th.labels.map(()=>r(2,10));const max=Math.max(...vals);const maxLabel=th.labels[vals.indexOf(max)];const total=vals.reduce((a,b)=>a+b,0);
    // Q1: which is tallest
    qs.push({theme:th,vals,text:`${th.title}: Which has the most?`,answer:maxLabel,options:shuffle([...th.labels])});
    // Q2: how many for specific
    const pick=r(0,th.labels.length-1);
    qs.push({theme:th,vals,text:`How many for ${th.labels[pick]}?`,answer:String(vals[pick]),options:shuffle([String(vals[pick]),String(vals[pick]+1),String(vals[pick]-1>0?vals[pick]-1:vals[pick]+2),String(vals[(pick+1)%4])])});
    // Q3: total or difference
    if(t<2){qs.push({theme:th,vals,text:`What is the total?`,answer:String(total),options:shuffle([String(total),String(total+2),String(total-3),String(max*4)])});}
  }
  shuffle(qs);const qList=qs.slice(0,10);
  let idx=0,score=0;
  const chart=document.getElementById('chart'),qText=document.getElementById('qText'),opts=document.getElementById('opts'),feedback=document.getElementById('feedback'),nextBtn=document.getElementById('nextBtn'),scoreEl=document.getElementById('scoreEl'),qNum=document.getElementById('qNum'),questionArea=document.getElementById('questionArea'),resultDiv=document.getElementById('result');
  function drawChart(th,vals){chart.innerHTML='';const mx=Math.max(...vals);vals.forEach((v,i)=>{const g=document.createElement('div');g.className='bar-group';const b=document.createElement('div');b.className='bar';b.style.height=Math.round((v/mx)*130)+'px';b.style.background=colors[i%colors.length];const l=document.createElement('div');l.className='bar-label';l.textContent=th.labels[i];g.appendChild(b);g.appendChild(l);chart.appendChild(g);});}
  function show(){if(idx>=qList.length){end();return;}const q=qList[idx];drawChart(q.theme,q.vals);qText.textContent=q.text;opts.innerHTML='';feedback.textContent='';nextBtn.style.display='none';qNum.textContent=`${idx+1} / ${qList.length}`;let done=false;
    let oArr=[...new Set(q.options)];if(!oArr.includes(q.answer)){oArr[0]=q.answer;}oArr=shuffle(oArr).slice(0,4);
    oArr.forEach(o=>{const b=document.createElement('button');b.textContent=o;b.addEventListener('click',()=>{if(done)return;done=true;opts.querySelectorAll('button').forEach(btn=>{btn.disabled=true;if(btn.textContent===q.answer)btn.classList.add('correct');});if(o===q.answer){score++;scoreEl.textContent='Score: '+score;feedback.textContent='✓ Correct!';feedback.style.color='var(--success)';}else{b.classList.add('wrong');feedback.textContent='✗ Answer: '+q.answer;feedback.style.color='var(--error)';}nextBtn.style.display='inline-block';});opts.appendChild(b);});}
  nextBtn.addEventListener('click',()=>{idx++;show();});
  function end(){questionArea.style.display='none';const pct=Math.round(score/qList.length*100);let s=pct>=90?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐';resultDiv.style.display='block';resultDiv.innerHTML=`<div class="star">${s}</div><h2>${score} / ${qList.length}</h2><p>${pct>=90?'Outstanding!':pct>=60?'Well done!':'Keep practising!'}</p><button class="restart-btn" onclick="location.reload()">Play Again</button>`;}
  show();
})();
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistics — Bar Charts — Year 3 Maths | Game Learn</title>
  <style>
    /* ── Child Baseline (animations/_shared/child-baseline.css) ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--accent2:#a78bfa;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px;--tap-min:44px;--tap-primary:56px;--tap-gap:12px;--child-font-base:18px;--child-font-prompt:20px;--child-font-answer:22px;--radius-child:16px}
    html{font-size:100%}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem;font-size:var(--child-font-base);line-height:1.55;-webkit-text-size-adjust:100%;text-size-adjust:100%}
    button,[role="button"],a.btn,.tap,[tabindex]:not([tabindex="-1"]),input[type="button"],input[type="submit"]{min-height:var(--tap-min);min-width:var(--tap-min);padding:.65rem 1rem;font-size:var(--child-font-answer);border-radius:var(--radius-child);touch-action:manipulation}
    .primary-tap,button.primary,[role="button"].primary{min-height:var(--tap-primary);min-width:var(--tap-primary);font-size:var(--child-font-answer);font-weight:700}
    :focus-visible{outline:3px solid #ffd166;outline-offset:3px;border-radius:var(--radius-child)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
    p,li,label,.prompt,.instruction{font-size:var(--child-font-prompt);line-height:1.55;max-width:42ch}
    img,svg,canvas{max-width:100%;height:auto}
    html,body{overflow-x:hidden}
    header{text-align:center;max-width:640px;width:100%}
    .tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
    h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
    .subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}

    /* Bar chart builder */
    .builder{display:flex;flex-direction:column;gap:1rem}
    .bar-area{display:flex;align-items:flex-end;gap:.6rem;justify-content:center;height:220px;border-bottom:2px solid var(--border);padding-bottom:.5rem}
    .bar-col{display:flex;flex-direction:column;align-items:center;gap:.3rem;flex:1;max-width:80px}
    .bar{width:100%;border-radius:6px 6px 0 0;transition:height .3s ease;cursor:pointer}
    .bar-val{font-size:.82rem;font-weight:700;color:var(--primary)}
    .bar-label{font-size:.75rem;color:var(--text-muted);text-align:center}
    .bar-btns{display:flex;gap:.3rem}
    .b-btn{width:28px;height:28px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .b-btn:hover{background:var(--primary);color:#0f172a}
    .chart-total{text-align:center;font-size:.9rem;color:var(--text-muted)}
    .chart-total span{color:var(--primary);font-weight:700}

    /* Quiz */
    .quiz-area{display:flex;flex-direction:column;gap:1rem}
    .q-text{font-size:1rem;font-weight:700;text-align:center}
    .opts{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
    .opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1.1rem;font-size:.95rem;cursor:pointer;color:var(--text);transition:background .12s}
    .opt-btn:hover{border-color:var(--accent)}
    .opt-btn.correct{background:var(--success);color:#0f172a;font-weight:700}
    .opt-btn.wrong{background:var(--error);color:#0f172a}
    .opt-btn.disabled{pointer-events:none;opacity:.5}
    .fb{text-align:center;font-size:.88rem;min-height:1.2em}
    .score-bar{text-align:center;font-size:.9rem;color:var(--text-muted)}.score-bar span{color:var(--primary);font-weight:700}

    @media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  </style>
</head>
<body>
  <header>
    <p class="tag">Year 3 · Maths</p>
    <h1>Bar Charts</h1>
    <p class="subtitle">Build your own bar chart and answer questions about data!</p>
  </header>

  <!-- Bar chart builder -->
  <div class="card">
    <p class="card-title">Bar Chart Builder</p>
    <div class="builder">
      <div class="bar-area" id="barArea"></div>
      <div class="chart-total">Total: <span id="total">0</span></div>
    </div>
  </div>

  <!-- Quiz -->
  <div class="card">
    <p class="card-title">Data Detective Quiz</p>
    <div class="score-bar">Score: <span id="score">0</span> / <span id="maxS">5</span></div>
    <div class="quiz-area" id="quiz"></div>
    <p class="fb" id="fb" aria-live="polite"></p>
  </div>

  <script>
    /* ── Bar Chart Builder ── */
    const COLOURS = ['#fbbf24','#38bdf8','#a78bfa','#34d399','#f87171'];
    const ITEMS = [
      { label:'Apples', val:4 },
      { label:'Bananas', val:6 },
      { label:'Oranges', val:3 },
      { label:'Grapes', val:8 },
      { label:'Pears', val:5 }
    ];
    const MAX = 12;
    const barArea = document.getElementById('barArea');
    const totalEl = document.getElementById('total');

    function buildBars() {
      barArea.innerHTML = '';
      ITEMS.forEach(function(item, i) {
        const col = document.createElement('div');
        col.className = 'bar-col';

        const valEl = document.createElement('div');
        valEl.className = 'bar-val';
        valEl.textContent = item.val;
        valEl.id = 'bv-' + i;

        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.background = COLOURS[i % COLOURS.length];
        bar.style.height = (item.val / MAX * 180) + 'px';
        bar.id = 'bar-' + i;
        bar.setAttribute('aria-label', item.label + ': ' + item.val);

        const label = document.createElement('div');
        label.className = 'bar-label';
        label.textContent = item.label;

        const btns = document.createElement('div');
        btns.className = 'bar-btns';
        const plus = document.createElement('button');
        plus.className = 'b-btn'; plus.textContent = '+'; plus.setAttribute('aria-label','Increase ' + item.label);
        plus.addEventListener('click', function() { if(item.val < MAX){item.val++;updateBar(i);} });
        const minus = document.createElement('button');
        minus.className = 'b-btn'; minus.textContent = '−'; minus.setAttribute('aria-label','Decrease ' + item.label);
        minus.addEventListener('click', function() { if(item.val > 0){item.val--;updateBar(i);} });
        btns.appendChild(plus); btns.appendChild(minus);

        col.appendChild(valEl);
        col.appendChild(bar);
        col.appendChild(label);
        col.appendChild(btns);
        barArea.appendChild(col);
      });
      updateTotal();
    }

    function updateBar(i) {
      const bar = document.getElementById('bar-' + i);
      const valEl = document.getElementById('bv-' + i);
      bar.style.height = (ITEMS[i].val / MAX * 180) + 'px';
      valEl.textContent = ITEMS[i].val;
      bar.setAttribute('aria-label', ITEMS[i].label + ': ' + ITEMS[i].val);
      updateTotal();
    }

    function updateTotal() {
      totalEl.textContent = ITEMS.reduce(function(s,it){return s+it.val;},0);
    }

    buildBars();

    /* ── Quiz ── */
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    const QUESTIONS = [
      { q:"A bar chart shows: Blue 9, Red 6, Green 4. Which colour is most popular?", a:"Blue", d:["Red","Green","Yellow"] },
      { q:"Blue 9, Green 4. How many more chose Blue?", a:"5", d:["4","13","9"] },
      { q:"In a pictogram each symbol = 2 children. 8 children = how many symbols?", a:"4", d:["8","16","2"] },
      { q:"Bar chart shows: Red 7, Blue 5, Green 3. Total votes?", a:"15", d:["12","18","10"] },
      { q:"Which axis usually shows the categories?", a:"The bottom (horizontal) axis", d:["The side (vertical) axis","Both axes","Neither axis"] },
      { q:"If each symbol in a pictogram = 5, and a row has 3 symbols, the value is?", a:"15", d:["3","5","8"] },
      { q:"Bar chart: Cats 10, Dogs 7. Difference?", a:"3", d:["17","7","10"] }
    ];

    let sc = 0, qi = 0;
    const qs = shuffle(QUESTIONS).slice(0,5);
    const quizEl = document.getElementById('quiz');
    const fbEl = document.getElementById('fb');
    const scEl = document.getElementById('score');

    function renderQ(){
      if(qi>=qs.length){quizEl.innerHTML='';const p=document.createElement('p');p.className='q-text';p.style.color='var(--primary)';p.textContent='Great work! '+sc+' / '+qs.length+'!';quizEl.appendChild(p);fbEl.textContent='';return;}
      const q=qs[qi];const opts=shuffle([q.a,...q.d]);quizEl.innerHTML='';fbEl.textContent='';
      const qt=document.createElement('p');qt.className='q-text';qt.textContent=(qi+1)+'. '+q.q;quizEl.appendChild(qt);
      const od=document.createElement('div');od.className='opts';
      opts.forEach(function(o){const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
        btn.addEventListener('click',function(){od.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');});
        if(o===q.a){btn.classList.add('correct','bounce');sc++;scEl.textContent=sc;fbEl.textContent='\u2713 Correct!';fbEl.style.color='var(--success)';}
        else{btn.classList.add('wrong','shake');od.querySelectorAll('.opt-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');});fbEl.textContent='\u2717 Answer: '+q.a;fbEl.style.color='var(--error)';}
        qi++;setTimeout(renderQ,1100);});od.appendChild(btn);});quizEl.appendChild(od);
    }
    renderQ();
  </script>
</body>
</html>
