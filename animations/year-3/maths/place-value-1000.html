<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Place Value to 1000 — Quiz Game</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --border: #475569; --primary: #818cf8; --accent: #38bdf8;
    --success: #4ade80; --error: #f87171; --text: #f1f5f9; --text-muted: #94a3b8;
    --tap-min: 44px; --tap-primary: 56px; --child-font-base: 18px;
    --radius: 12px; font-family: system-ui, -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-size: var(--child-font-base); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem; }
  h1 { font-size: 1.5rem; margin-bottom: .5rem; text-align: center; }
  .subtitle { color: var(--text-muted); margin-bottom: 1.5rem; text-align: center; }
  .score-bar { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; font-weight: 600; }
  .score-bar span { padding: .4rem .8rem; background: var(--surface); border-radius: var(--radius); }
  .question-area { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 540px; text-align: center; margin-bottom: 1rem; }
  .question-area .q-text { font-size: 1.2rem; margin-bottom: 1.2rem; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .options button { min-height: var(--tap-primary); font-size: 1.1rem; border: 2px solid var(--border); border-radius: var(--radius); background: var(--surface2); color: var(--text); cursor: pointer; transition: .15s; font-family: inherit; }
  .options button:hover, .options button:focus-visible { border-color: var(--primary); outline: none; }
  .options button.correct { border-color: var(--success); background: #166534; }
  .options button.wrong { border-color: var(--error); background: #7f1d1d; }
  .options button:disabled { cursor: default; opacity: .85; }
  .feedback { min-height: 2rem; margin-top: 1rem; font-weight: 600; }
  .next-btn { margin-top: 1rem; min-height: var(--tap-primary); padding: 0 2rem; font-size: 1.1rem; border: none; border-radius: var(--radius); background: var(--primary); color: #fff; cursor: pointer; font-family: inherit; display: none; }
  .next-btn:hover { filter: brightness(1.15); }
  .result { text-align: center; }
  .result h2 { font-size: 1.8rem; margin-bottom: .5rem; }
  .result .star { font-size: 3rem; }
  .restart-btn { margin-top: 1rem; min-height: var(--tap-primary); padding: 0 2rem; font-size: 1.1rem; border: none; border-radius: var(--radius); background: var(--accent); color: #0f172a; cursor: pointer; font-weight: 600; font-family: inherit; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<h1>Place Value to 1000</h1>
<p class="subtitle">Year 3 Maths — Quiz Game</p>
<div class="score-bar"><span id="scoreEl">Score: 0</span><span id="qNum">1 / 10</span></div>
<div class="question-area" id="questionArea">
  <p class="q-text" id="qText"></p>
  <div class="options" id="opts"></div>
  <p class="feedback" id="feedback"></p>
  <button class="next-btn" id="nextBtn">Next →</button>
</div>
<div class="result" id="result" style="display:none"></div>
<script>
(function(){
  const difficulties = {easy:[],medium:[],hard:[]};
  function r(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=r(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
  // Generate questions
  for(let i=0;i<5;i++){
    const n=r(100,400);const h=Math.floor(n/100)*100;const t=Math.floor((n%100)/10)*10;const o=n%10;
    const digit=r(0,2);const labels=['hundreds','tens','ones'];const vals=[h,t,o];
    const q={text:`What is the value of the digit ${String(n)[digit]} in ${n}?`,answer:String(vals[digit]),options:shuffle([String(vals[digit]),...new Set([String(r(1,9)*100),String(r(1,9)*10),String(r(1,9))])].filter((v,i,a)=>a.indexOf(v)===i)).slice(0,4)};
    if(q.options.length<4)q.options.push(String(r(10,90)));
    difficulties.easy.push(q);
  }
  for(let i=0;i<5;i++){
    const n=r(200,800);const choices=[n-r(1,3)*10,n,n+r(1,3)*10,n+r(1,2)*100];
    const rounded10=Math.round(n/10)*10;
    difficulties.medium.push({text:`Round ${n} to the nearest 10.`,answer:String(rounded10),options:shuffle([...new Set([String(rounded10),String(rounded10-10),String(rounded10+10),String(Math.round(n/100)*100)])]).slice(0,4)});
  }
  for(let i=0;i<5;i++){
    const n=r(150,950);const rounded100=Math.round(n/100)*100;
    difficulties.hard.push({text:`Round ${n} to the nearest 100.`,answer:String(rounded100),options:shuffle([...new Set([String(rounded100),String(rounded100-100),String(rounded100+100),String(Math.round(n/10)*10)])]).slice(0,4)});
  }
  const questions=shuffle([...shuffle(difficulties.easy).slice(0,4),...shuffle(difficulties.medium).slice(0,3),...shuffle(difficulties.hard).slice(0,3)]);
  let idx=0,score=0;
  const qText=document.getElementById('qText'),opts=document.getElementById('opts'),feedback=document.getElementById('feedback'),nextBtn=document.getElementById('nextBtn'),scoreEl=document.getElementById('scoreEl'),qNum=document.getElementById('qNum'),questionArea=document.getElementById('questionArea'),resultDiv=document.getElementById('result');
  function show(){
    if(idx>=questions.length){showResult();return;}
    const q=questions[idx];qText.textContent=q.text;opts.innerHTML='';feedback.textContent='';nextBtn.style.display='none';qNum.textContent=`${idx+1} / ${questions.length}`;
    let answered=false;
    // ensure answer is in options
    let oSet=new Set(q.options);oSet.add(q.answer);let oArr=shuffle([...oSet]).slice(0,4);if(!oArr.includes(q.answer)){oArr[0]=q.answer;oArr=shuffle(oArr);}
    oArr.forEach(o=>{const b=document.createElement('button');b.textContent=o;b.addEventListener('click',()=>{if(answered)return;answered=true;
      opts.querySelectorAll('button').forEach(btn=>{btn.disabled=true;if(btn.textContent===q.answer)btn.classList.add('correct');});
      if(o===q.answer){score++;scoreEl.textContent='Score: '+score;feedback.textContent='✓ Correct!';feedback.style.color='var(--success)';}
      else{b.classList.add('wrong');feedback.textContent='✗ The answer is '+q.answer;feedback.style.color='var(--error)';}
      nextBtn.style.display='inline-block';});opts.appendChild(b);});
  }
  nextBtn.addEventListener('click',()=>{idx++;show();});
  function showResult(){questionArea.style.display='none';const pct=Math.round(score/questions.length*100);
    let stars=pct>=90?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐';
    resultDiv.style.display='block';resultDiv.innerHTML=`<div class="star">${stars}</div><h2>${score} / ${questions.length}</h2><p>${pct>=90?'Amazing work!':pct>=60?'Good job!':'Keep practising!'}</p><button class="restart-btn" onclick="location.reload()">Play Again</button>`;}
  show();
})();
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Place Value to 1000 — Year 3 Maths | Game Learn</title>
  <style>
    /* ── Child Baseline (animations/_shared/child-baseline.css) ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273344;
      --border: rgba(148,163,184,0.15);
      --primary: #fbbf24;
      --primary-dark: #d97706;
      --accent: #38bdf8;
      --accent2: #a78bfa;
      --success: #34d399;
      --error: #f87171;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius: 16px;
      --radius-sm: 8px;
      --tap-min: 44px; --tap-primary: 56px; --tap-gap: 12px;
      --child-font-base: 18px; --child-font-prompt: 20px; --child-font-answer: 22px;
      --radius-child: 16px;
    }
    html { font-size: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: var(--child-font-base); line-height: 1.55;
      -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 1.5rem 1rem 3rem; gap: 1.5rem;
    }
    button,[role="button"],a.btn,.tap,[tabindex]:not([tabindex="-1"]),input[type="button"],input[type="submit"]{min-height:var(--tap-min);min-width:var(--tap-min);padding:.65rem 1rem;font-size:var(--child-font-answer);border-radius:var(--radius-child);touch-action:manipulation}
    .primary-tap,button.primary,[role="button"].primary{min-height:var(--tap-primary);min-width:var(--tap-primary);font-size:var(--child-font-answer);font-weight:700}
    :focus-visible{outline:3px solid #ffd166;outline-offset:3px;border-radius:var(--radius-child)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
    p,li,label,.prompt,.instruction{font-size:var(--child-font-prompt);line-height:1.55;max-width:42ch}
    img,svg,canvas{max-width:100%;height:auto}
    html,body{overflow-x:hidden}
    header { text-align: center; max-width: 640px; width: 100%; }
    .tag { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: .4rem; }
    h1 { font-size: clamp(1.4rem,4vw,2rem); font-weight: 800; color: var(--primary); }
    .subtitle { color: var(--text-muted); font-size: .9rem; margin-top: .5rem; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 640px;
    }
    .card-title { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; }

    /* Number Machine */
    .machine { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }
    .columns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .col { display: flex; flex-direction: column; align-items: center; gap: .5rem; }
    .col-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); }
    .col-value {
      width: 80px; height: 80px; border-radius: var(--radius);
      background: var(--surface2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; color: var(--primary);
      transition: border-color .15s;
    }
    .col-value.active { border-color: var(--primary); }
    .col-btns { display: flex; gap: .4rem; }
    .col-btn {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 1.1rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .col-btn:hover { background: var(--primary); color: #0f172a; }

    .number-display {
      font-size: 2.5rem; font-weight: 800; color: var(--accent);
      letter-spacing: .05em;
    }
    .expanded {
      font-size: 1rem; color: var(--text-muted);
    }

    /* Quiz */
    .quiz { display: flex; flex-direction: column; gap: 1rem; }
    .quiz-q { font-size: .95rem; font-weight: 600; }
    .quiz-opts { display: flex; flex-wrap: wrap; gap: .5rem; }
    .quiz-opt {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: .55rem 1rem; font-size: .88rem;
      cursor: pointer; transition: background .12s, border-color .12s;
    }
    .quiz-opt:hover { border-color: var(--accent); }
    .quiz-opt.correct { background: var(--success); color: #0f172a; border-color: var(--success); font-weight: 700; }
    .quiz-opt.wrong { background: var(--error); color: #0f172a; border-color: var(--error); }
    .quiz-opt.disabled { pointer-events: none; opacity: .6; }
    .quiz-feedback { font-size: .85rem; min-height: 1.2em; }

    .score-bar {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      font-size: .9rem; color: var(--text-muted);
    }
    .score-bar span { color: var(--primary); font-weight: 700; }

    @media (prefers-reduced-motion: no-preference) {
      .bounce { animation: bounce .4s ease; }
      .shake { animation: shake .35s ease; }
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeInUp .4s ease both; }
  </style>
</head>
<body>

  <header>
    <p class="tag">Year 3 · Maths</p>
    <h1>Place Value to 1000</h1>
    <p class="subtitle">Build numbers with hundreds, tens and ones — then test yourself!</p>
  </header>

  <!-- Number Machine -->
  <div class="card">
    <p class="card-title">Number Machine</p>
    <div class="machine">
      <div class="columns" id="columns">
        <div class="col">
          <span class="col-label">Hundreds</span>
          <div class="col-value" id="h-val" aria-label="Hundreds digit">0</div>
          <div class="col-btns">
            <button class="col-btn" data-col="h" data-dir="1" aria-label="Increase hundreds">+</button>
            <button class="col-btn" data-col="h" data-dir="-1" aria-label="Decrease hundreds">−</button>
          </div>
        </div>
        <div class="col">
          <span class="col-label">Tens</span>
          <div class="col-value" id="t-val" aria-label="Tens digit">0</div>
          <div class="col-btns">
            <button class="col-btn" data-col="t" data-dir="1" aria-label="Increase tens">+</button>
            <button class="col-btn" data-col="t" data-dir="-1" aria-label="Decrease tens">−</button>
          </div>
        </div>
        <div class="col">
          <span class="col-label">Ones</span>
          <div class="col-value" id="o-val" aria-label="Ones digit">0</div>
          <div class="col-btns">
            <button class="col-btn" data-col="o" data-dir="1" aria-label="Increase ones">+</button>
            <button class="col-btn" data-col="o" data-dir="-1" aria-label="Decrease ones">−</button>
          </div>
        </div>
      </div>
      <div class="number-display" id="total" aria-live="polite">0</div>
      <div class="expanded" id="expanded">0 + 0 + 0 = 0</div>
    </div>
  </div>

  <!-- Quiz -->
  <div class="card">
    <p class="card-title">Quick Quiz</p>
    <div class="score-bar">Score: <span id="score">0</span> / <span id="max-score">0</span></div>
    <div class="quiz" id="quiz"></div>
    <p class="quiz-feedback" id="feedback" aria-live="polite"></p>
  </div>

  <script>
    /* ── Number Machine ── */
    const digits = { h: 0, t: 0, o: 0 };
    const hVal = document.getElementById('h-val');
    const tVal = document.getElementById('t-val');
    const oVal = document.getElementById('o-val');
    const totalEl = document.getElementById('total');
    const expandedEl = document.getElementById('expanded');

    function updateMachine() {
      hVal.textContent = digits.h;
      tVal.textContent = digits.t;
      oVal.textContent = digits.o;
      const num = digits.h * 100 + digits.t * 10 + digits.o;
      totalEl.textContent = num;
      expandedEl.textContent = (digits.h * 100) + ' + ' + (digits.t * 10) + ' + ' + digits.o + ' = ' + num;
    }

    document.getElementById('columns').addEventListener('click', function(e) {
      const btn = e.target.closest('.col-btn');
      if (!btn) return;
      const col = btn.dataset.col;
      const dir = parseInt(btn.dataset.dir, 10);
      digits[col] = Math.max(0, Math.min(9, digits[col] + dir));
      const valEl = document.getElementById(col === 'h' ? 'h-val' : col === 't' ? 't-val' : 'o-val');
      valEl.classList.remove('active');
      void valEl.offsetWidth;
      valEl.classList.add('active');
      setTimeout(function() { valEl.classList.remove('active'); }, 300);
      updateMachine();
    });

    /* ── Quiz ── */
    const QUESTIONS = [
      { q: "What is the value of the digit 7 in 472?", a: "70", d: ["7", "700", "47"] },
      { q: "Partition 839: 800 + ? + 9", a: "30", d: ["3", "80", "39"] },
      { q: "Which is greater: 604 or 640?", a: "640", d: ["604", "They are equal", "Cannot tell"] },
      { q: "Round 456 to the nearest 10.", a: "460", d: ["450", "400", "500"] },
      { q: "Round 851 to the nearest 100.", a: "900", d: ["800", "850", "860"] },
      { q: "What number is 500 + 60 + 3?", a: "563", d: ["536", "653", "560"] },
      { q: "In 905, how many tens are there?", a: "0", d: ["9", "5", "90"] },
      { q: "Round 178 to the nearest 10.", a: "180", d: ["170", "200", "100"] }
    ];

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    let score = 0;
    let qIndex = 0;
    const quizEl = document.getElementById('quiz');
    const feedbackEl = document.getElementById('feedback');
    const scoreEl = document.getElementById('score');
    const maxEl = document.getElementById('max-score');
    const shuffled = shuffle(QUESTIONS).slice(0, 5);
    maxEl.textContent = shuffled.length;

    function renderQuestion() {
      if (qIndex >= shuffled.length) {
        quizEl.innerHTML = '';
        const done = document.createElement('p');
        done.style.cssText = 'text-align:center;font-size:1.2rem;font-weight:700;color:var(--primary);padding:1rem 0;';
        done.textContent = 'Well done! You scored ' + score + ' out of ' + shuffled.length + '!';
        quizEl.appendChild(done);
        feedbackEl.textContent = '';
        return;
      }
      const q = shuffled[qIndex];
      const opts = shuffle([q.a, ...q.d]);
      quizEl.innerHTML = '';
      feedbackEl.textContent = '';

      const qEl = document.createElement('p');
      qEl.className = 'quiz-q fade-in';
      qEl.textContent = (qIndex + 1) + '. ' + q.q;
      quizEl.appendChild(qEl);

      const optsEl = document.createElement('div');
      optsEl.className = 'quiz-opts fade-in';
      opts.forEach(function(opt) {
        const btn = document.createElement('button');
        btn.className = 'quiz-opt';
        btn.textContent = opt;
        btn.setAttribute('role', 'option');
        btn.addEventListener('click', function() {
          const allBtns = optsEl.querySelectorAll('.quiz-opt');
          allBtns.forEach(function(b) { b.classList.add('disabled'); });
          if (opt === q.a) {
            btn.classList.add('correct', 'bounce');
            score++;
            scoreEl.textContent = score;
            feedbackEl.textContent = '✓ Correct!';
            feedbackEl.style.color = 'var(--success)';
          } else {
            btn.classList.add('wrong', 'shake');
            allBtns.forEach(function(b) { if (b.textContent === q.a) b.classList.add('correct'); });
            feedbackEl.textContent = '✗ The answer is ' + q.a;
            feedbackEl.style.color = 'var(--error)';
          }
          qIndex++;
          setTimeout(renderQuestion, 1200);
        });
        optsEl.appendChild(btn);
      });
      quizEl.appendChild(optsEl);
    }

    renderQuestion();
  </script>
</body>
</html>
