<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplication &amp; Division — Quiz Game</title>
<style>
  :root {
    --bg: #FFF9F2; --surface: #FFFFFF; --surface2: #F5EEE3;
    --border: #E8DCC7; --primary: #4A5FDB; --accent: #FF8A3D;
    --success: #1FA66A; --error: #D8452B; --text: #1E1E2A; --text-muted: #5A5566;
    --tap-min: 44px; --tap-primary: 56px; --child-font-base: 18px;
    --radius: 12px; font-family: system-ui, -apple-system, sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-size:var(--child-font-base);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem;}
  h1{font-size:1.5rem;margin-bottom:.5rem;text-align:center;}
  .subtitle{color:var(--text-muted);margin-bottom:1.5rem;text-align:center;}
  .score-bar{display:flex;gap:1.5rem;margin-bottom:1.5rem;font-weight:600;}
  .score-bar span{padding:.4rem .8rem;background:var(--surface);border-radius:var(--radius);}
  .question-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:540px;text-align:center;margin-bottom:1rem;}
  .q-text{font-size:1.2rem;margin-bottom:1.2rem;}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
  .options button{min-height:var(--tap-primary);font-size:1.1rem;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);cursor:pointer;transition:.15s;font-family:inherit;}
  .options button:hover,.options button:focus-visible{border-color:var(--primary);outline:none;}
  .options button.correct{border-color:var(--success);background:#1FA66A;}
  .options button.wrong{border-color:var(--error);background:#D8452B;}
  .options button:disabled{cursor:default;opacity:.85;}
  .feedback{min-height:2rem;margin-top:1rem;font-weight:600;}
  .next-btn{margin-top:1rem;min-height:var(--tap-primary);padding:0 2rem;font-size:1.1rem;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;display:none;}
  .next-btn:hover{filter:brightness(1.15);}
  .result{text-align:center;} .result h2{font-size:1.8rem;margin-bottom:.5rem;} .result .star{font-size:3rem;}
  .restart-btn{margin-top:1rem;min-height:var(--tap-primary);padding:0 2rem;font-size:1.1rem;border:none;border-radius:var(--radius);background:var(--accent);color:#0f172a;cursor:pointer;font-weight:600;font-family:inherit;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<h1>Multiplication &amp; Division</h1>
<p class="subtitle">Year 3 Maths — Quiz Game</p>
<div class="score-bar"><span id="scoreEl">Score: 0</span><span id="qNum">1 / 10</span></div>
<div class="question-area" id="questionArea">
  <p class="q-text" id="qText"></p>
  <div class="options" id="opts"></div>
  <p class="feedback" id="feedback"></p>
  <button class="next-btn" id="nextBtn">Next →</button>
</div>
<div class="result" id="result" style="display:none"></div>
<script>
(function(){
  function r(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=r(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
  function wrongAnswers(correct,count){const s=new Set();s.add(correct);while(s.size<count+1){let w=correct+r(-5,5);if(w>0&&w!==correct)s.add(w);}s.delete(correct);return[...s].slice(0,count);}
  const tables=[3,4,8];const qs=[];
  // Easy: simple times tables
  for(let i=0;i<4;i++){const t=tables[r(0,2)];const m=r(2,12);const ans=t*m;
    qs.push({text:`What is ${t} × ${m}?`,answer:String(ans),options:shuffle([String(ans),...wrongAnswers(ans,3).map(String)])});}
  // Medium: division using tables
  for(let i=0;i<3;i++){const t=tables[r(0,2)];const m=r(2,12);const product=t*m;
    qs.push({text:`What is ${product} ÷ ${t}?`,answer:String(m),options:shuffle([String(m),...wrongAnswers(m,3).map(String)])});}
  // Hard: 2-digit × 1-digit
  for(let i=0;i<3;i++){const a2=r(12,25);const b1=tables[r(0,2)];const ans=a2*b1;
    qs.push({text:`What is ${a2} × ${b1}?`,answer:String(ans),options:shuffle([String(ans),...wrongAnswers(ans,3).map(String)])});}
  shuffle(qs);
  let idx=0,score=0;
  const qText=document.getElementById('qText'),opts=document.getElementById('opts'),feedback=document.getElementById('feedback'),nextBtn=document.getElementById('nextBtn'),scoreEl=document.getElementById('scoreEl'),qNum=document.getElementById('qNum'),questionArea=document.getElementById('questionArea'),resultDiv=document.getElementById('result');
  function show(){if(idx>=qs.length){end();return;}const q=qs[idx];qText.textContent=q.text;opts.innerHTML='';feedback.textContent='';nextBtn.style.display='none';qNum.textContent=`${idx+1} / ${qs.length}`;let done=false;
    let oArr=shuffle([...new Set(q.options)]);if(!oArr.includes(q.answer)){oArr[0]=q.answer;oArr=shuffle(oArr);}oArr.slice(0,4).forEach(o=>{const b=document.createElement('button');b.textContent=o;b.addEventListener('click',()=>{if(done)return;done=true;opts.querySelectorAll('button').forEach(btn=>{btn.disabled=true;if(btn.textContent===q.answer)btn.classList.add('correct');});if(o===q.answer){score++;scoreEl.textContent='Score: '+score;feedback.textContent='Correct!';feedback.style.color='var(--success)';}else{b.classList.add('wrong');feedback.textContent='Answer: '+q.answer;feedback.style.color='var(--error)';}nextBtn.style.display='inline-block';});opts.appendChild(b);});}
  nextBtn.addEventListener('click',()=>{idx++;show();});
  function end(){questionArea.style.display='none';const pct=Math.round(score/qs.length*100);let s=pct>=90?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐';resultDiv.style.display='block';resultDiv.innerHTML=`<div class="star">${s}</div><h2>${score} / ${qs.length}</h2><p>${pct>=90?'Brilliant!':pct>=60?'Good job!':'Keep practising!'}</p><button class="restart-btn" onclick="location.reload()">Play Again</button>`;}
  show();
})();
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplication and Division — Year 3 Maths | Game Learn</title>
  <style>
    /* ── Child Baseline (animations/_shared/child-baseline.css) ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFF9F2; --surface: #FFFFFF; --surface2: #F5EEE3;
      --border: rgba(148,163,184,0.15); --primary: #4A5FDB; --primary-dark: #d97706;
      --accent: #FF8A3D; --accent2: #a78bfa; --success: #1FA66A; --error: #D8452B;
      --text: #1E1E2A; --text-muted: #5A5566; --radius: 16px; --radius-sm: 8px;
      --tap-min: 44px; --tap-primary: 56px; --tap-gap: 12px;
      --child-font-base: 18px; --child-font-prompt: 20px; --child-font-answer: 22px;
      --radius-child: 16px;
    }
    html { font-size: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: var(--child-font-base); line-height: 1.55;
      -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 1.5rem 1rem 3rem; gap: 1.5rem; }
    button,[role="button"],a.btn,.tap,[tabindex]:not([tabindex="-1"]),input[type="button"],input[type="submit"]{min-height:var(--tap-min);min-width:var(--tap-min);padding:.65rem 1rem;font-size:var(--child-font-answer);border-radius:var(--radius-child);touch-action:manipulation}
    .primary-tap,button.primary,[role="button"].primary{min-height:var(--tap-primary);min-width:var(--tap-primary);font-size:var(--child-font-answer);font-weight:700}
    :focus-visible{outline:3px solid #ffd166;outline-offset:3px;border-radius:var(--radius-child)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
    p,li,label,.prompt,.instruction{font-size:var(--child-font-prompt);line-height:1.55;max-width:42ch}
    img,svg,canvas{max-width:100%;height:auto}
    html,body{overflow-x:hidden}
    header { text-align: center; max-width: 640px; width: 100%; }
    .tag { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: .4rem; }
    h1 { font-size: clamp(1.4rem,4vw,2rem); font-weight: 800; color: var(--primary); }
    .subtitle { color: var(--text-muted); font-size: .9rem; margin-top: .5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 640px; }
    .card-title { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; }

    /* Array Builder */
    .array-controls { display: flex; gap: 1rem; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; }
    .arr-label { font-size: .85rem; color: var(--text-muted); }
    .arr-select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .4rem .6rem; font-size: 1rem; }
    .array-grid { display: flex; flex-direction: column; align-items: center; gap: 4px; min-height: 120px; }
    .array-row { display: flex; gap: 4px; }
    .dot { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); opacity: 0; }
    .array-result { text-align: center; font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-top: .75rem; }

    /* Quiz */
    .quiz-area { display: flex; flex-direction: column; gap: 1rem; }
    .q-text { font-size: 1.1rem; font-weight: 700; text-align: center; }
    .opts { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; }
    .opt-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .6rem 1.2rem; font-size: 1rem; cursor: pointer; color: var(--text); transition: background .12s, border-color .12s; }
    .opt-btn:hover { border-color: var(--accent); }
    .opt-btn.correct { background: var(--success); color: #FFFFFF; border-color: var(--success); font-weight: 700; }
    .opt-btn.wrong { background: var(--error); color: #FFFFFF; border-color: var(--error); }
    .opt-btn.disabled { pointer-events: none; opacity: .5; }
    .feedback { text-align: center; font-size: .9rem; min-height: 1.2em; }
    .score-bar { text-align: center; font-size: .9rem; color: var(--text-muted); }
    .score-bar span { color: var(--primary); font-weight: 700; }

    /* Tabs */
    .tabs { display: flex; gap: .5rem; justify-content: center; margin-bottom: .5rem; }
    .tab-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 20px; padding: .4rem 1rem; font-size: .82rem; cursor: pointer; }
    .tab-btn.active { background: var(--primary); color: #0f172a; border-color: var(--primary); font-weight: 700; }

    @media (prefers-reduced-motion: no-preference) {
      .bounce { animation: bounce .4s ease; }
      .shake { animation: shake .35s ease; }
      .pop { animation: pop .3s ease both; }
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes pop { from{opacity:0;transform:scale(.3)} to{opacity:1;transform:scale(1)} }
  </style>
</head>
<body>
  <header>
    <p class="tag">Year 3 · Maths</p>
    <h1>Multiplication &amp; Division</h1>
    <p class="subtitle">Build arrays and practise your 3, 4 and 8 times tables!</p>
  </header>

  <!-- Array Builder -->
  <div class="card">
    <p class="card-title">Array Builder</p>
    <div class="array-controls">
      <span class="arr-label">Rows</span>
      <select class="arr-select" id="rows-sel" aria-label="Number of rows">
        <option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option>
      </select>
      <span class="arr-label">×</span>
      <select class="arr-select" id="cols-sel" aria-label="Number of columns">
        <option>1</option><option>2</option><option selected>4</option><option>3</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option>
      </select>
    </div>
    <div class="array-grid" id="array-grid" role="img" aria-label="Multiplication array"></div>
    <div class="array-result" id="array-result" aria-live="polite"></div>
  </div>

  <!-- Quiz -->
  <div class="card">
    <p class="card-title">Times Table Challenge</p>
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-table="3">× 3</button>
      <button class="tab-btn" data-table="4">× 4</button>
      <button class="tab-btn" data-table="8">× 8</button>
      <button class="tab-btn" data-table="mix">Mix</button>
    </div>
    <div class="score-bar">Score: <span id="score">0</span> / <span id="max">5</span></div>
    <div class="quiz-area" id="quiz-area"></div>
    <p class="feedback" id="feedback" aria-live="polite"></p>
  </div>

  <script>
    /* ── Array Builder ── */
    const rowsSel = document.getElementById('rows-sel');
    const colsSel = document.getElementById('cols-sel');
    const gridEl = document.getElementById('array-grid');
    const resultEl = document.getElementById('array-result');

    function buildArray() {
      const r = parseInt(rowsSel.value, 10);
      const c = parseInt(colsSel.value, 10);
      gridEl.innerHTML = '';
      let delay = 0;
      for (let i = 0; i < r; i++) {
        const row = document.createElement('div');
        row.className = 'array-row';
        for (let j = 0; j < c; j++) {
          const dot = document.createElement('div');
          dot.className = 'dot pop';
          dot.style.animationDelay = delay + 'ms';
          delay += 30;
          row.appendChild(dot);
        }
        gridEl.appendChild(row);
      }
      resultEl.textContent = r + ' \u00d7 ' + c + ' = ' + (r * c);
    }

    rowsSel.addEventListener('change', buildArray);
    colsSel.addEventListener('change', buildArray);
    buildArray();

    /* ── Quiz ── */
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function makeQuestions(table) {
      const qs = [];
      const tables = table === 'mix' ? [3, 4, 8] : [parseInt(table, 10)];
      tables.forEach(function(t) {
        for (let i = 1; i <= 12; i++) {
          const answer = i * t;
          const d1 = answer + t;
          const d2 = answer - t;
          const d3 = answer + 1;
          const dists = [d1, d2, d3].filter(function(v) { return v > 0 && v !== answer; });
          while (dists.length < 3) dists.push(answer + dists.length + 2);
          qs.push({ q: i + ' \u00d7 ' + t, a: String(answer), d: dists.slice(0, 3).map(String) });
        }
      });
      return shuffle(qs).slice(0, 5);
    }

    let currentTable = '3';
    let questions = [];
    let qIdx = 0;
    let score = 0;
    const quizArea = document.getElementById('quiz-area');
    const feedbackEl = document.getElementById('feedback');
    const scoreEl = document.getElementById('score');
    const maxEl = document.getElementById('max');

    function startQuiz() {
      questions = makeQuestions(currentTable);
      qIdx = 0; score = 0;
      scoreEl.textContent = '0';
      maxEl.textContent = questions.length;
      renderQ();
    }

    function renderQ() {
      if (qIdx >= questions.length) {
        quizArea.innerHTML = '';
        const p = document.createElement('p');
        p.className = 'q-text';
        p.style.color = 'var(--primary)';
        p.textContent = 'Well done! ' + score + ' out of ' + questions.length + ' correct!';
        quizArea.appendChild(p);
        feedbackEl.textContent = '';
        return;
      }
      const q = questions[qIdx];
      const opts = shuffle([q.a, ...q.d]);
      quizArea.innerHTML = '';
      feedbackEl.textContent = '';

      const qText = document.createElement('p');
      qText.className = 'q-text';
      qText.textContent = q.q + ' = ?';
      quizArea.appendChild(qText);

      const optsDiv = document.createElement('div');
      optsDiv.className = 'opts';
      opts.forEach(function(o) {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = o;
        btn.addEventListener('click', function() {
          optsDiv.querySelectorAll('.opt-btn').forEach(function(b) { b.classList.add('disabled'); });
          if (o === q.a) {
            btn.classList.add('correct', 'bounce');
            score++;
            scoreEl.textContent = score;
            feedbackEl.textContent = '\u2713 Correct!';
            feedbackEl.style.color = 'var(--success)';
          } else {
            btn.classList.add('wrong', 'shake');
            optsDiv.querySelectorAll('.opt-btn').forEach(function(b) { if (b.textContent === q.a) b.classList.add('correct'); });
            feedbackEl.textContent = '\u2717 The answer is ' + q.a;
            feedbackEl.style.color = 'var(--error)';
          }
          qIdx++;
          setTimeout(renderQ, 1100);
        });
        optsDiv.appendChild(btn);
      });
      quizArea.appendChild(optsDiv);
    }

    /* Tabs */
    document.getElementById('tabs').addEventListener('click', function(e) {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentTable = btn.dataset.table;
      startQuiz();
    });

    startQuiz();
  </script>
</body>
</html>
