<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Writing — Quiz Game</title>
<style>
  :root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--primary:#818cf8;--accent:#38bdf8;--success:#4ade80;--error:#f87171;--text:#f1f5f9;--text-muted:#94a3b8;--tap-min:44px;--tap-primary:56px;--child-font-base:18px;--radius:12px;font-family:system-ui,-apple-system,sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-size:var(--child-font-base);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem;}
  h1{font-size:1.5rem;margin-bottom:.5rem;text-align:center;}.subtitle{color:var(--text-muted);margin-bottom:1.5rem;text-align:center;}
  .score-bar{display:flex;gap:1.5rem;margin-bottom:1.5rem;font-weight:600;}.score-bar span{padding:.4rem .8rem;background:var(--surface);border-radius:var(--radius);}
  .qa{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:560px;text-align:center;margin-bottom:1rem;}
  .q-text{font-size:1.1rem;margin-bottom:1.2rem;line-height:1.5;}
  .excerpt{background:var(--surface2);padding:1rem;border-radius:8px;margin-bottom:1rem;text-align:left;line-height:1.6;}
  .options{display:grid;grid-template-columns:1fr;gap:.6rem;}
  .options button{min-height:var(--tap-primary);font-size:1rem;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);cursor:pointer;transition:.15s;font-family:inherit;padding:.5rem .75rem;text-align:left;}
  .options button:hover,.options button:focus-visible{border-color:var(--primary);outline:none;}
  .options button.correct{border-color:var(--success);background:#166534;}.options button.wrong{border-color:var(--error);background:#7f1d1d;}
  .options button:disabled{cursor:default;opacity:.85;}.feedback{min-height:2rem;margin-top:1rem;font-weight:600;}
  .next-btn{margin-top:1rem;min-height:var(--tap-primary);padding:0 2rem;font-size:1.1rem;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;cursor:pointer;font-family:inherit;display:none;}.next-btn:hover{filter:brightness(1.15);}
  .result{text-align:center;}.result h2{font-size:1.8rem;margin-bottom:.5rem;}.result .star{font-size:3rem;}
  .restart-btn{margin-top:1rem;min-height:var(--tap-primary);padding:0 2rem;font-size:1.1rem;border:none;border-radius:var(--radius);background:var(--accent);color:#0f172a;cursor:pointer;font-weight:600;font-family:inherit;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<h1>Report Writing</h1>
<p class="subtitle">Year 3 English — Quiz Game</p>
<div class="score-bar"><span id="scoreEl">Score: 0</span><span id="qNum">1 / 10</span></div>
<div class="qa" id="questionArea">
  <div class="excerpt" id="excerpt"></div>
  <p class="q-text" id="qText"></p>
  <div class="options" id="opts"></div>
  <p class="feedback" id="feedback"></p>
  <button class="next-btn" id="nextBtn">Next →</button>
</div>
<div class="result" id="result" style="display:none"></div>
<script>
(function(){
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  const qs=[
    {excerpt:'',text:'What type of text is a non-chronological report?',answer:'An information text organised by topic',options:['An information text organised by topic','A story told in time order','A set of instructions','A letter to a friend']},
    {excerpt:'',text:'Which of these is a FACT?',answer:'Elephants are the largest land animals.',options:['Elephants are the largest land animals.','Elephants are the best animals.','I really love elephants.','Elephants are boring.']},
    {excerpt:'"Dogs are well cute and they love running about."',text:'Rewrite this in a formal tone:',answer:'Dogs are popular pets known for their energy.',options:['Dogs are popular pets known for their energy.','Dogs are well cool innit.','I think dogs are the best ever!','Dogs. Yeah. They run.']},
    {excerpt:'',text:'What do sub-headings do in a report?',answer:'Organise the text into sections',options:['Organise the text into sections','Tell you the page number','Add exciting dialogue','Make the text rhyme']},
    {excerpt:'',text:'Which word should you avoid in a formal report?',answer:'Loads',options:['Loads','Many','Several','Various']},
    {excerpt:'',text:'What is a topic sentence?',answer:'The first sentence of a paragraph that tells you what it is about',options:['The first sentence of a paragraph that tells you what it is about','The title of the report','A sentence with a question mark','The last sentence of the report']},
    {excerpt:'',text:'A report should be written in which tone?',answer:'Formal and informative',options:['Formal and informative','Chatty and funny','Sad and emotional','Angry and loud']},
    {excerpt:'',text:'Which of these would NOT be a good sub-heading for a report about tigers?',answer:'Why I Love Tigers',options:['Why I Love Tigers','Appearance','Habitat','Diet']},
    {excerpt:'',text:'What does "non-chronological" mean?',answer:'Not in time order',options:['Not in time order','Written very quickly','About clocks','In alphabetical order']},
    {excerpt:'',text:'What should a report conclusion contain?',answer:'A summary or interesting final fact',options:['A summary or interesting final fact','A cliff-hanger','The word "The End"','A joke']},
  ];
  shuffle(qs);
  let idx=0,score=0;
  const excerpt=document.getElementById('excerpt'),qText=document.getElementById('qText'),opts=document.getElementById('opts'),feedback=document.getElementById('feedback'),nextBtn=document.getElementById('nextBtn'),scoreEl=document.getElementById('scoreEl'),qNum=document.getElementById('qNum'),questionArea=document.getElementById('questionArea'),resultDiv=document.getElementById('result');
  function show(){if(idx>=qs.length){end();return;}const q=qs[idx];excerpt.textContent=q.excerpt;excerpt.style.display=q.excerpt?'block':'none';qText.textContent=q.text;opts.innerHTML='';feedback.textContent='';nextBtn.style.display='none';qNum.textContent=`${idx+1} / ${qs.length}`;let done=false;
    shuffle([...q.options]).forEach(o=>{const b=document.createElement('button');b.textContent=o;b.addEventListener('click',()=>{if(done)return;done=true;opts.querySelectorAll('button').forEach(btn=>{btn.disabled=true;if(btn.textContent===q.answer)btn.classList.add('correct');});if(o===q.answer){score++;scoreEl.textContent='Score: '+score;feedback.textContent='✓ Correct!';feedback.style.color='var(--success)';}else{b.classList.add('wrong');feedback.textContent='✗ Answer: '+q.answer;feedback.style.color='var(--error)';}nextBtn.style.display='inline-block';});opts.appendChild(b);});}
  nextBtn.addEventListener('click',()=>{idx++;show();});
  function end(){questionArea.style.display='none';const pct=Math.round(score/qs.length*100);let s=pct>=90?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐';resultDiv.style.display='block';resultDiv.innerHTML=`<div class="star">${s}</div><h2>${score} / ${qs.length}</h2><p>${pct>=90?'Report writing pro!':pct>=60?'Good job!':'Keep practising!'}</p><button class="restart-btn" onclick="location.reload()">Play Again</button>`;}
  show();
})();
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Writing — Year 3 English | Game Learn</title>
  <style>
    /* ── Child Baseline (animations/_shared/child-baseline.css) ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--accent2:#a78bfa;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px;--tap-min:44px;--tap-primary:56px;--tap-gap:12px;--child-font-base:18px;--child-font-prompt:20px;--child-font-answer:22px;--radius-child:16px}
    html{font-size:100%}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem;font-size:var(--child-font-base);line-height:1.55;-webkit-text-size-adjust:100%;text-size-adjust:100%}
    button,[role="button"],a.btn,.tap,[tabindex]:not([tabindex="-1"]),input[type="button"],input[type="submit"]{min-height:var(--tap-min);min-width:var(--tap-min);padding:.65rem 1rem;font-size:var(--child-font-answer);border-radius:var(--radius-child);touch-action:manipulation}
    .primary-tap,button.primary,[role="button"].primary{min-height:var(--tap-primary);min-width:var(--tap-primary);font-size:var(--child-font-answer);font-weight:700}
    :focus-visible{outline:3px solid #ffd166;outline-offset:3px;border-radius:var(--radius-child)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
    p,li,label,.prompt,.instruction{font-size:var(--child-font-prompt);line-height:1.55;max-width:42ch}
    img,svg,canvas{max-width:100%;height:auto}
    html,body{overflow-x:hidden}
    header{text-align:center;max-width:640px;width:100%}
    .tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
    h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
    .subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}

    .q-text{font-size:.95rem;font-weight:600;margin-bottom:.5rem}
    .opts{display:flex;flex-direction:column;gap:.4rem}
    .opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);text-align:left;transition:background .12s}
    .opt-btn:hover{border-color:var(--accent)}
    .opt-btn.correct{background:var(--success);color:#0f172a;font-weight:700}
    .opt-btn.wrong{background:var(--error);color:#0f172a}
    .opt-btn.disabled{pointer-events:none;opacity:.5}
    .fb{text-align:center;font-size:.88rem;min-height:1.2em;margin-top:.5rem}
    .score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-bottom:.5rem}.score-bar span{color:var(--primary);font-weight:700}
    .quiz-area{display:flex;flex-direction:column;gap:1rem}

    /* Sentence upgrader */
    .upgrader{display:flex;flex-direction:column;gap:1rem}
    .sentence-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;font-size:.95rem;line-height:1.6}
    .highlight{background:var(--error);color:#0f172a;padding:.1rem .4rem;border-radius:4px;cursor:pointer;font-weight:600}
    .options-popup{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
    .up-opt{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.35rem .75rem;font-size:.85rem;cursor:pointer;color:var(--text)}
    .up-opt:hover{border-color:var(--accent)}
    .up-opt.picked{background:var(--success);color:#0f172a;font-weight:700}
    .up-result{text-align:center;font-size:.9rem;min-height:1.2em}

    @media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  </style>
</head>
<body>
  <header>
    <p class="tag">Year 3 · English</p>
    <h1>Report Writing</h1>
    <p class="subtitle">Upgrade informal sentences and test your report skills!</p>
  </header>

  <!-- Sentence Upgrader -->
  <div class="card">
    <p class="card-title">Formal or Informal?</p>
    <div class="upgrader" id="upgrader"></div>
  </div>

  <!-- Quiz -->
  <div class="card">
    <p class="card-title">Report Writing Quiz</p>
    <div class="score-bar">Score: <span id="score">0</span> / <span id="maxS">0</span></div>
    <div class="quiz-area" id="quiz"></div>
    <p class="fb" id="fb" aria-live="polite"></p>
  </div>

  <script>
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    /* ── Sentence Upgrader ── */
    const UPGRADES = [
      { informal: "Lions are mega cool and they eat loads of stuff.", formal: "Lions are powerful predators that hunt in groups called prides.", hint: "Use precise vocabulary and a formal tone." },
      { informal: "Penguins are really funny birds that waddle about.", formal: "Penguins are flightless birds that are well adapted to life in cold climates.", hint: "Replace chatty words with factual description." },
      { informal: "Volcanoes are well scary and blow up sometimes.", formal: "Volcanoes are openings in the Earth's surface through which lava and gases escape.", hint: "Describe the science, not your feelings." },
      { informal: "Foxes eat basically anything they can find.", formal: "Foxes are omnivores, meaning they eat both plants and animals.", hint: "Use subject-specific vocabulary like 'omnivore'." }
    ];

    const upgraderEl = document.getElementById('upgrader');
    let upIdx = 0;

    function renderUpgrade() {
      if (upIdx >= UPGRADES.length) {
        upgraderEl.innerHTML = '<p style="text-align:center;color:var(--primary);font-weight:700;">All sentences upgraded! Well done!</p>';
        return;
      }
      const u = UPGRADES[upIdx];
      upgraderEl.innerHTML = '';

      const label = document.createElement('p');
      label.style.cssText = 'font-size:.85rem;color:var(--text-muted);';
      label.textContent = 'This sentence is too informal for a report. Pick the formal version:';
      upgraderEl.appendChild(label);

      const box = document.createElement('div');
      box.className = 'sentence-box';
      box.textContent = u.informal;
      upgraderEl.appendChild(box);

      const opts = document.createElement('div');
      opts.className = 'options-popup';
      const choices = shuffle([u.formal, u.informal]);
      choices.forEach(function(c) {
        const btn = document.createElement('button');
        btn.className = 'up-opt';
        btn.textContent = c;
        btn.addEventListener('click', function() {
          opts.querySelectorAll('.up-opt').forEach(function(b) { b.style.pointerEvents = 'none'; });
          if (c === u.formal) {
            btn.classList.add('picked');
            box.textContent = u.formal;
            box.style.borderColor = 'var(--success)';
            const res = document.createElement('p');
            res.className = 'up-result';
            res.textContent = '\u2713 ' + u.hint;
            res.style.color = 'var(--success)';
            upgraderEl.appendChild(res);
          } else {
            btn.style.background = 'var(--error)';
            btn.style.color = '#0f172a';
            const res = document.createElement('p');
            res.className = 'up-result';
            res.textContent = '\u2717 That\'s the informal version! ' + u.hint;
            res.style.color = 'var(--error)';
            upgraderEl.appendChild(res);
          }
          upIdx++;
          setTimeout(renderUpgrade, 2000);
        });
        opts.appendChild(btn);
      });
      upgraderEl.appendChild(opts);
    }
    renderUpgrade();

    /* ── Quiz ── */
    const QUESTIONS = [
      { q: "Which tense is best for a non-chronological report?", a: "Present tense", d: ["Past tense","Future tense","No tense matters"] },
      { q: "Why do reports use sub-headings?", a: "To split information into clear sections", d: ["To make the report longer","To add opinions","To tell a story"] },
      { q: "Which sentence is formal enough for a report?", a: "Lions live in groups called prides.", d: ["Lions are proper cool!","Lions are like super strong.","Lions are my favourite."] },
      { q: "A good report is mostly full of:", a: "Facts", d: ["Opinions","Jokes","Dialogue"] },
      { q: "What appears at the very start of a report?", a: "A title and an introduction", d: ["Once upon a time","A character description","The end"] },
      { q: "\"Non-chronological\" means the writing is:", a: "Not in time order", d: ["In time order","Very short","A story"] }
    ];

    let sc = 0, qi = 0;
    const qs = shuffle(QUESTIONS).slice(0, 5);
    const quizEl = document.getElementById('quiz');
    const fbEl = document.getElementById('fb');
    const scEl = document.getElementById('score');
    document.getElementById('maxS').textContent = qs.length;

    function renderQ() {
      if (qi >= qs.length) { quizEl.innerHTML = ''; const p = document.createElement('p'); p.className = 'q-text'; p.style.color = 'var(--primary)'; p.style.textAlign = 'center'; p.textContent = 'Great work! ' + sc + ' / ' + qs.length + '!'; quizEl.appendChild(p); fbEl.textContent = ''; return; }
      const q = qs[qi]; const opts = shuffle([q.a, ...q.d]); quizEl.innerHTML = ''; fbEl.textContent = '';
      const qt = document.createElement('p'); qt.className = 'q-text'; qt.textContent = (qi+1) + '. ' + q.q; quizEl.appendChild(qt);
      const od = document.createElement('div'); od.className = 'opts';
      opts.forEach(function(o) {
        const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.textContent = o;
        btn.addEventListener('click', function() {
          od.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');});
          if (o === q.a) { btn.classList.add('correct','bounce'); sc++; scEl.textContent = sc; fbEl.textContent = '\u2713 Correct!'; fbEl.style.color = 'var(--success)'; }
          else { btn.classList.add('wrong','shake'); od.querySelectorAll('.opt-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');}); fbEl.textContent = '\u2717 Answer: ' + q.a; fbEl.style.color = 'var(--error)'; }
          qi++; setTimeout(renderQ, 1100);
        }); od.appendChild(btn);
      }); quizEl.appendChild(od);
    }
    renderQ();
  </script>
</body>
</html>
