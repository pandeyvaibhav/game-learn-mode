<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>World War II — Year 6 History | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.diff-row{display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem}
.diff-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.35rem .9rem;font-size:.8rem;cursor:pointer;color:var(--text)}
.diff-btn.active{border-color:var(--primary);color:var(--primary)}
.q-text{font-size:.95rem;font-weight:600;text-align:center;margin-bottom:.5rem}
.num-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.85rem;cursor:pointer;color:var(--text);min-width:100px;text-align:center}
.opt-btn:hover{border-color:var(--accent)}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.5rem}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.95rem;min-height:1.2em;margin-top:.5rem;font-weight:600}
.new-btn{display:block;margin:.5rem auto 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem 1rem;color:var(--text);font-size:.85rem;cursor:pointer}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 6 · History</p>
<h1>World War II</h1>
<p class="subtitle">Causes, the Blitz, evacuation, and VE Day!</p>
</header>

<div class="card">
<p class="card-title">WW2 Quiz</p>
<div class="diff-row"><button class="diff-btn active" data-d="1">Easy</button><button class="diff-btn" data-d="2">Medium</button><button class="diff-btn" data-d="3">Hard</button></div>
<p class="q-text" id="qTxt"></p>
<div class="num-row" id="opts"></div>
<p class="fb" id="fb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="sc">0</span></div>
<button class="new-btn" id="next">Next</button>
</div>

<script>
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
var BANKS={
1:[
{q:'WW2 started in…',ans:'1939',opts:['1939','1945','1914']},
{q:'The Blitz was…',ans:'German bombing of British cities',opts:['German bombing of British cities','A dance','A sport']},
{q:'VE Day was on…',ans:'8 May 1945',opts:['8 May 1945','25 December 1940','1 January 1939']},
{q:'Evacuation moved children to…',ans:'The countryside',opts:['The countryside','Germany','The Moon']},
{q:'Rationing meant…',ans:'Food and goods were limited',opts:['Food and goods were limited','Free food for all','No rules']}
],
2:[
{q:'Germany invaded which country to start WW2?',ans:'Poland',opts:['Poland','France','Britain']},
{q:'Anderson shelters were used during…',ans:'Air raids',opts:['Air raids','Lunch','School']},
{q:'"Dig for Victory" encouraged people to…',ans:'Grow their own food',opts:['Grow their own food','Dig trenches','Find treasure']},
{q:'The Allies included…',ans:'Britain, USA, USSR, France',opts:['Britain, USA, USSR, France','Germany, Italy, Japan','Only Britain']},
{q:'Blackout rules meant…',ans:'Windows covered at night to hide from bombers',opts:['Windows covered at night to hide from bombers','Lights always on','No electricity at all']}
],
3:[
{q:'The war in the Pacific ended in…',ans:'August 1945',opts:['August 1945','May 1945','1939']},
{q:'Land Girls were…',ans:'Women who worked on farms during the war',opts:['Women who worked on farms during the war','Female soldiers','Pilots']},
{q:'About how many children were evacuated?',ans:'Over 1.5 million',opts:['Over 1.5 million','100','50 million']},
{q:'The Axis powers were…',ans:'Germany, Italy, Japan',opts:['Germany, Italy, Japan','Britain, France, USA','Russia, China, India']},
{q:'The Blitz killed about…',ans:'43,000 civilians',opts:['43,000 civilians','100 people','1 million soldiers']}
]};
var diff=1,sc=0,pool,idx;
function load(){pool=shuffle(BANKS[diff]);idx=0;}load();
document.querySelectorAll('.diff-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.diff-btn').forEach(function(x){x.classList.remove('active')});b.classList.add('active');diff=+b.dataset.d;load();show();});});
function show(){if(idx>=pool.length){pool=shuffle(BANKS[diff]);idx=0;}var q=pool[idx];document.getElementById('qTxt').textContent=q.q;document.getElementById('fb').textContent='';var opts=document.getElementById('opts');opts.innerHTML='';shuffle(q.opts).forEach(function(o){var btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;btn.addEventListener('click',function(){opts.querySelectorAll('.opt-btn').forEach(function(b){b.style.pointerEvents='none';b.style.opacity='.5';});btn.style.opacity='1';if(o===q.ans){btn.style.borderColor='var(--success)';btn.classList.add('bounce');sc++;document.getElementById('sc').textContent=sc;document.getElementById('fb').textContent='✓ Correct!';document.getElementById('fb').style.color='var(--success)';}else{btn.style.borderColor='var(--error)';btn.classList.add('shake');document.getElementById('fb').textContent='✗ '+q.ans;document.getElementById('fb').style.color='var(--error)';}});opts.appendChild(btn);});idx++;}
document.getElementById('next').addEventListener('click',show);show();
</script>
</body>
</html>
