<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Place Value to 10,000 — Year 4 Maths | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--accent2:#a78bfa;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.diff-row{display:flex;gap:.4rem;justify-content:center;margin-bottom:1rem}
.diff-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.35rem .8rem;font-size:.8rem;cursor:pointer;color:var(--text)}
.diff-btn.active{border-color:var(--primary);color:var(--primary);font-weight:700}
.number-display{font-size:2rem;font-weight:800;text-align:center;letter-spacing:.15em;color:var(--accent);margin-bottom:.5rem}
.q-text{font-size:.95rem;font-weight:600;text-align:center;margin-bottom:.5rem}
.num-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);min-width:80px;text-align:center;font-weight:700}
.opt-btn:hover{border-color:var(--accent)}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.5rem}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.95rem;min-height:1.2em;margin-top:.5rem;font-weight:600}
.new-btn{display:block;margin:.5rem auto 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem 1rem;color:var(--text);font-size:.85rem;cursor:pointer}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 4 · Maths</p>
<h1>Place Value to 10,000</h1>
<p class="subtitle">What is the value of each digit?</p>
</header>

<div class="card">
<p class="card-title">Difficulty</p>
<div class="diff-row">
<button class="diff-btn active" data-d="1">Easy</button>
<button class="diff-btn" data-d="2">Medium</button>
<button class="diff-btn" data-d="3">Hard</button>
</div>
<div class="number-display" id="num"></div>
<p class="q-text" id="qTxt"></p>
<div class="num-row" id="opts"></div>
<p class="fb" id="fb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="sc">0</span></div>
<button class="new-btn" id="next">Next Question</button>
</div>

<script>
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
var sc=0,diff=1;
var diffBtns=document.querySelectorAll('.diff-btn');
diffBtns.forEach(function(b){b.addEventListener('click',function(){diffBtns.forEach(function(x){x.classList.remove('active');});b.classList.add('active');diff=parseInt(b.dataset.d);newQ();});});

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function fmt(n){return n.toLocaleString();}

function newQ(){
  var n=rand(1001,9999);
  var digits={Th:Math.floor(n/1000),H:Math.floor((n%1000)/100),T:Math.floor((n%100)/10),O:n%10};
  document.getElementById('num').textContent=fmt(n);
  document.getElementById('fb').textContent='';
  var q,ans;

  if(diff===1){
    // Easy: what is the value of digit X?
    var cols=shuffle(['Th','H','T','O']);var pick=cols[0];
    var names={Th:'thousands',H:'hundreds',T:'tens',O:'ones'};
    var mults={Th:1000,H:100,T:10,O:1};
    var val=digits[pick]*mults[pick];
    q='What is the value of the '+names[pick]+' digit?';
    ans=fmt(val);
    var choices=[ans];
    while(choices.length<4){var d=fmt(rand(0,9)*mults[pick]);if(choices.indexOf(d)===-1)choices.push(d);}
    render(q,ans,choices);
  } else if(diff===2){
    // Medium: compare two numbers
    var a=rand(1001,9999),b=rand(1001,9999);
    while(b===a) b=rand(1001,9999);
    document.getElementById('num').textContent=fmt(a)+' ? '+fmt(b);
    q='Which symbol goes in the gap?';
    ans=a>b?'>':a<b?'<':'=';
    render(q,ans,shuffle(['>','<','=']));
  } else {
    // Hard: round to nearest 1000
    q='Round '+fmt(n)+' to the nearest 1,000.';
    ans=fmt(Math.round(n/1000)*1000);
    var choices=[ans];
    [Math.floor(n/1000)*1000,Math.ceil(n/1000)*1000,(Math.round(n/1000)+1)*1000].forEach(function(v){var s=fmt(v);if(choices.indexOf(s)===-1)choices.push(s);});
    while(choices.length<4) choices.push(fmt(rand(1,9)*1000));
    render(q,ans,choices);
  }
}
function render(q,ans,choices){
  document.getElementById('qTxt').textContent=q;
  var opts=document.getElementById('opts');opts.innerHTML='';
  shuffle(choices).forEach(function(c){
    var btn=document.createElement('button');btn.className='opt-btn';btn.textContent=c;
    btn.addEventListener('click',function(){
      opts.querySelectorAll('.opt-btn').forEach(function(b){b.style.pointerEvents='none';b.style.opacity='.5';});
      btn.style.opacity='1';
      if(c===ans){btn.style.borderColor='var(--success)';btn.classList.add('bounce');sc++;document.getElementById('sc').textContent=sc;document.getElementById('fb').textContent='✓ '+ans;document.getElementById('fb').style.color='var(--success)';}
      else{btn.style.borderColor='var(--error)';btn.classList.add('shake');document.getElementById('fb').textContent='✗ '+ans;document.getElementById('fb').style.color='var(--error)';}
    });opts.appendChild(btn);
  });
}
document.getElementById('next').addEventListener('click',newQ);newQ();
</script>
</body>
</html>
