<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Creating Media — Animation — Year 4 Computing | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
/* Mini flip-book demo */
.flipbook{text-align:center;margin-bottom:1rem}
.flipbook canvas{background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.flip-controls{display:flex;gap:.5rem;justify-content:center;margin-top:.5rem}
.flip-controls button{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.3rem .8rem;color:var(--text);cursor:pointer;font-size:.8rem}
.q-text{font-size:.95rem;font-weight:600;text-align:center;margin-bottom:.5rem}
.num-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.85rem;cursor:pointer;color:var(--text);min-width:100px;text-align:center}
.opt-btn:hover{border-color:var(--accent)}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.5rem}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.95rem;min-height:1.2em;margin-top:.5rem;font-weight:600}
.new-btn{display:block;margin:.5rem auto 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem 1rem;color:var(--text);font-size:.85rem;cursor:pointer}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 4 · Computing</p>
<h1>Creating Media — Animation</h1>
<p class="subtitle">Frames, flip books, and stop motion!</p>
</header>

<div class="card">
<p class="card-title">Mini Flip Book</p>
<div class="flipbook">
<canvas id="cv" width="200" height="150"></canvas>
<div class="flip-controls">
<button id="playBtn">Play</button>
<button id="stopBtn">Stop</button>
<span style="color:var(--text-muted);font-size:.75rem;line-height:2" id="fLabel">Frame 1/8</span>
</div>
</div>
</div>

<div class="card">
<p class="card-title">Animation Quiz</p>
<p class="q-text" id="qTxt"></p>
<div class="num-row" id="opts"></div>
<p class="fb" id="fb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="sc">0</span></div>
<button class="new-btn" id="next">Next Question</button>
</div>

<script>
/* Flip book — bouncing ball */
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
var frames=8,fi=0,tid=null;
function drawFrame(i){
  ctx.clearRect(0,0,200,150);
  ctx.fillStyle='#273344';ctx.fillRect(0,0,200,150);
  // ground
  ctx.strokeStyle='#94a3b8';ctx.beginPath();ctx.moveTo(0,130);ctx.lineTo(200,130);ctx.stroke();
  // ball bouncing arc
  var x=25+i*22;
  var heights=[100,70,50,40,50,70,100,120];
  var y=heights[i];
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.fill();
  // shadow
  ctx.fillStyle='rgba(251,191,36,.15)';ctx.beginPath();ctx.ellipse(x,132,12,3,0,0,Math.PI*2);ctx.fill();
  document.getElementById('fLabel').textContent='Frame '+(i+1)+'/'+frames;
}
drawFrame(0);
document.getElementById('playBtn').addEventListener('click',function(){
  if(tid)return;tid=setInterval(function(){fi=(fi+1)%frames;drawFrame(fi);},150);
});
document.getElementById('stopBtn').addEventListener('click',function(){clearInterval(tid);tid=null;});

/* Quiz */
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
var QS=[
{q:'What is a frame?',ans:'A single image in an animation',opts:['A single image in an animation','A type of camera','A drawing tool']},
{q:'What is onion skinning?',ans:'Seeing a faint copy of the previous frame',opts:['Seeing a faint copy of the previous frame','Peeling layers off a drawing','A type of animation']},
{q:'How does stop motion work?',ans:'Move an object a tiny bit, take a photo, repeat',opts:['Move an object a tiny bit, take a photo, repeat','Draw on a computer','Use a printer']},
{q:'What does fps stand for?',ans:'Frames per second',opts:['Frames per second','Fast picture show','Flip page speed']},
{q:'More frames per second makes animation…',ans:'Smoother',opts:['Smoother','Slower','Louder']},
{q:'A flip book works by…',ans:'Flipping pages quickly to show changing images',opts:['Flipping pages quickly to show changing images','Reading a story','Drawing one picture']},
{q:'The first step in planning an animation is…',ans:'Creating a storyboard',opts:['Creating a storyboard','Exporting the file','Adding sound effects']},
{q:'Animation creates the illusion of…',ans:'Movement',opts:['Movement','Sound','Colour']}
];
var pool=shuffle(QS);var idx=0;var sc=0;
function show(){
  if(idx>=pool.length) pool=shuffle(QS),idx=0;
  var q=pool[idx];
  document.getElementById('qTxt').textContent=q.q;
  document.getElementById('fb').textContent='';
  var opts=document.getElementById('opts');opts.innerHTML='';
  shuffle(q.opts).forEach(function(o){
    var btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
    btn.addEventListener('click',function(){
      opts.querySelectorAll('.opt-btn').forEach(function(b){b.style.pointerEvents='none';b.style.opacity='.5';});
      btn.style.opacity='1';
      if(o===q.ans){btn.style.borderColor='var(--success)';btn.classList.add('bounce');sc++;document.getElementById('sc').textContent=sc;document.getElementById('fb').textContent='✓ '+q.ans+'!';document.getElementById('fb').style.color='var(--success)';}
      else{btn.style.borderColor='var(--error)';btn.classList.add('shake');document.getElementById('fb').textContent='✗ '+q.ans;document.getElementById('fb').style.color='var(--error)';}
    });opts.appendChild(btn);
  });
  idx++;
}
document.getElementById('next').addEventListener('click',show);show();
</script>
</body>
</html>
