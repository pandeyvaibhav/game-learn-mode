<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rivers — Year 4 Geography | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.diff-row{display:flex;gap:.4rem;justify-content:center;margin-bottom:1rem}
.diff-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.35rem .8rem;font-size:.8rem;cursor:pointer;color:var(--text)}
.diff-btn.active{border-color:var(--primary);color:var(--primary);font-weight:700}
.q-text{font-size:.95rem;font-weight:600;text-align:center;margin-bottom:.5rem}
.num-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.85rem;cursor:pointer;color:var(--text);min-width:100px;text-align:center}
.opt-btn:hover{border-color:var(--accent)}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.5rem}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.95rem;min-height:1.2em;margin-top:.5rem;font-weight:600}
.new-btn{display:block;margin:.5rem auto 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem 1rem;color:var(--text);font-size:.85rem;cursor:pointer}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 4 · Geography</p>
<h1>Rivers</h1>
<p class="subtitle">From source to mouth!</p>
</header>

<div class="card">
<p class="card-title">Rivers Quiz</p>
<div class="diff-row">
<button class="diff-btn active" data-d="1">Easy</button>
<button class="diff-btn" data-d="2">Medium</button>
<button class="diff-btn" data-d="3">Hard</button>
</div>
<p class="q-text" id="qTxt"></p>
<div class="num-row" id="opts"></div>
<p class="fb" id="fb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="sc">0</span></div>
<button class="new-btn" id="next">Next</button>
</div>

<script>
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
var E=[
{q:'What is the source of a river?',ans:'Where it begins',opts:['Where it begins','Where it meets the sea','A type of fish']},
{q:'What is the mouth of a river?',ans:'Where it meets the sea',opts:['Where it meets the sea','Where it begins','The deepest part']},
{q:'What is a tributary?',ans:'A smaller river joining a larger one',opts:['A smaller river joining a larger one','A waterfall','A lake']},
{q:'What is erosion?',ans:'Water wearing away rock and soil',opts:['Water wearing away rock and soil','Water freezing','Fish swimming']}
];
var M=[
{q:'What is a meander?',ans:'A bend in a river',opts:['A bend in a river','A straight section','A waterfall']},
{q:'What is deposition?',ans:'A river dropping material it carried',opts:['A river dropping material it carried','Water evaporating','Rocks falling in']},
{q:'In the upper course a river is…',ans:'Fast and steep',opts:['Fast and steep','Wide and slow','Frozen']},
{q:'What is the longest river in the UK?',ans:'The Severn',opts:['The Severn','The Thames','The Trent']}
];
var H=[
{q:'A floodplain forms because…',ans:'The river deposits sediment on flat land',opts:['The river deposits sediment on flat land','Rain falls only there','Trees block the water']},
{q:'Meanders form because the river erodes…',ans:'The outer bank and deposits on the inner bank',opts:['The outer bank and deposits on the inner bank','Both banks equally','Only the riverbed']},
{q:'An estuary is…',ans:'Where a river widens as it meets the sea',opts:['Where a river widens as it meets the sea','A mountain lake','The fastest part of a river']},
{q:'Which river flows through London?',ans:'The Thames',opts:['The Thames','The Severn','The Trent']}
];
var BANKS={1:E,2:M,3:H};var diff=1,sc=0;
document.querySelectorAll('.diff-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.diff-btn').forEach(function(x){x.classList.remove('active');});b.classList.add('active');diff=parseInt(b.dataset.d);newQ();});});
var pool,idx;function reset(){pool=shuffle(BANKS[diff]);idx=0;}reset();
function newQ(){
  reset();var q=pool[idx%pool.length];idx++;
  document.getElementById('qTxt').textContent=q.q;
  document.getElementById('fb').textContent='';
  var opts=document.getElementById('opts');opts.innerHTML='';
  shuffle(q.opts).forEach(function(o){
    var btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
    btn.addEventListener('click',function(){
      opts.querySelectorAll('.opt-btn').forEach(function(b){b.style.pointerEvents='none';b.style.opacity='.5';});
      btn.style.opacity='1';
      if(o===q.ans){btn.style.borderColor='var(--success)';btn.classList.add('bounce');sc++;document.getElementById('sc').textContent=sc;document.getElementById('fb').textContent='✓ '+q.ans+'!';document.getElementById('fb').style.color='var(--success)';}
      else{btn.style.borderColor='var(--error)';btn.classList.add('shake');document.getElementById('fb').textContent='✗ '+q.ans;document.getElementById('fb').style.color='var(--error)';}
    });opts.appendChild(btn);
  });
}
document.getElementById('next').addEventListener('click',newQ);newQ();
</script>
</body>
</html>
