<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Phonics Phase 4 — Year 1 English | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.word-big{text-align:center;font-size:2.2rem;font-weight:800;color:var(--accent);letter-spacing:.15em;margin:.5rem 0}
.sounds{display:flex;gap:.3rem;justify-content:center;margin-bottom:.75rem}
.sound-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.3rem .5rem;font-size:1rem;font-weight:700;color:var(--primary)}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);text-align:center;min-width:80px}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:var(--success);color:#0f172a;font-weight:700}
.opt-btn.wrong{background:var(--error);color:#0f172a}
.opt-btn.disabled{pointer-events:none;opacity:.5}
.num-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.5rem}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.95rem;min-height:1.2em;margin-top:.5rem;font-weight:600}
.new-btn{display:block;margin:.5rem auto 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem 1rem;color:var(--text);font-size:.85rem;cursor:pointer}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 1 · English</p>
<h1>Phonics — Phase 4</h1>
<p class="subtitle">Blend the sounds to read the word!</p>
</header>

<div class="card">
<p class="card-title">Sound It Out</p>
<p style="font-size:.85rem;color:var(--text-muted);text-align:center;margin-bottom:.5rem">Look at the sounds, blend them together, and pick the right word.</p>
<div class="sounds" id="sounds"></div>
<div class="num-row" id="opts"></div>
<p class="fb" id="fb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="sc">0</span></div>
<button class="new-btn" id="next">Next Word</button>
</div>

<div class="card">
<p class="card-title">Tricky Word Flash</p>
<div class="word-big" id="tricky"></div>
<p style="font-size:.85rem;color:var(--text-muted);text-align:center">Can you read this tricky word?</p>
<button class="new-btn" id="nextTricky">Show Another</button>
</div>

<script>
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
var WORDS=[
{sounds:['s','t','o','p'],word:'stop'},{sounds:['c','r','a','b'],word:'crab'},
{sounds:['t','r','i','p'],word:'trip'},{sounds:['b','l','a','ck'],word:'black'},
{sounds:['s','a','n','d'],word:'sand'},{sounds:['j','u','m','p'],word:'jump'},
{sounds:['t','e','n','t'],word:'tent'},{sounds:['p','i','n','k'],word:'pink'},
{sounds:['s','t','a','r'],word:'star'},{sounds:['f','a','s','t'],word:'fast'},
{sounds:['b','e','s','t'],word:'best'},{sounds:['h','a','n','d'],word:'hand'}
];
var pool=shuffle(WORDS);var idx=0;var sc=0;

function show(){
  if(idx>=pool.length) pool=shuffle(WORDS),idx=0;
  var w=pool[idx];
  var sEl=document.getElementById('sounds');sEl.innerHTML='';
  w.sounds.forEach(function(s){var d=document.createElement('span');d.className='sound-box';d.textContent=s;sEl.appendChild(d);});
  document.getElementById('fb').textContent='';
  var opts=document.getElementById('opts');opts.innerHTML='';
  var choices=[w.word];
  var others=WORDS.filter(function(x){return x.word!==w.word;});
  shuffle(others).slice(0,3).forEach(function(x){choices.push(x.word);});
  shuffle(choices).forEach(function(c){
    var btn=document.createElement('button');btn.className='opt-btn';btn.textContent=c;
    btn.addEventListener('click',function(){
      opts.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');});
      if(c===w.word){btn.classList.add('correct','bounce');sc++;document.getElementById('sc').textContent=sc;document.getElementById('fb').textContent='✓ '+w.word+'!';document.getElementById('fb').style.color='var(--success)';}
      else{btn.classList.add('wrong','shake');document.getElementById('fb').textContent='✗ It says: '+w.word;document.getElementById('fb').style.color='var(--error)';}
    });opts.appendChild(btn);
  });
  idx++;
}
document.getElementById('next').addEventListener('click',show);show();

/* Tricky words */
var TRICKY=['the','said','have','like','some','come','were','there','one','do'];
var tIdx=0;var tPool=shuffle(TRICKY);
function showTricky(){
  if(tIdx>=tPool.length) tPool=shuffle(TRICKY),tIdx=0;
  document.getElementById('tricky').textContent=tPool[tIdx];tIdx++;
}
document.getElementById('nextTricky').addEventListener('click',showTricky);showTricky();
</script>
</body>
</html>
