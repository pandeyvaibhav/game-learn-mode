<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Phonics Phase 3 — Year 1 English | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.word-display{text-align:center;font-size:2rem;font-weight:800;color:var(--accent);letter-spacing:.2em;margin:.5rem 0}
.digraph-hl{color:var(--primary)}
.num-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);text-align:center;min-width:70px}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:var(--success);color:#0f172a;font-weight:700}
.opt-btn.wrong{background:var(--error);color:#0f172a}
.opt-btn.disabled{pointer-events:none;opacity:.5}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.5rem}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.95rem;min-height:1.2em;margin-top:.5rem;font-weight:600}
.new-btn{display:block;margin:.5rem auto 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem 1rem;color:var(--text);font-size:.85rem;cursor:pointer}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 1 · English</p>
<h1>Phonics — Phase 3</h1>
<p class="subtitle">Spot the digraph in each word!</p>
</header>

<div class="card">
<p class="card-title">Find the Digraph</p>
<p style="font-size:.85rem;color:var(--text-muted);margin-bottom:.5rem;text-align:center">Which digraph is hiding in this word?</p>
<div class="word-display" id="word"></div>
<div class="num-row" id="opts"></div>
<p class="fb" id="fb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="sc">0</span></div>
<button class="new-btn" id="next">Next Word</button>
</div>

<script>
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
var WORDS=[
{word:'ship',digraph:'sh'},{word:'chat',digraph:'ch'},{word:'this',digraph:'th'},
{word:'rain',digraph:'ai'},{word:'tree',digraph:'ee'},{word:'boat',digraph:'oa'},
{word:'moon',digraph:'oo'},{word:'fish',digraph:'sh'},{word:'much',digraph:'ch'},
{word:'with',digraph:'th'},{word:'tail',digraph:'ai'},{word:'sheep',digraph:'ee'},
{word:'coat',digraph:'oa'},{word:'food',digraph:'oo'},{word:'shop',digraph:'sh'}
];
var ALL_DG=['ch','sh','th','ai','ee','oa','oo'];
var pool=shuffle(WORDS);var idx=0;var sc=0;

function show(){
  if(idx>=pool.length) pool=shuffle(WORDS),idx=0;
  var w=pool[idx];
  var wEl=document.getElementById('word');
  // Highlight digraph
  var hl=w.word.replace(w.digraph,'<span class="digraph-hl">'+w.digraph+'</span>');
  wEl.innerHTML=w.word.toUpperCase(); // Don't reveal yet
  document.getElementById('fb').textContent='';
  var opts=document.getElementById('opts');opts.innerHTML='';
  var choices=[w.digraph];
  var rest=ALL_DG.filter(function(d){return d!==w.digraph;});
  choices=choices.concat(shuffle(rest).slice(0,3));
  shuffle(choices).forEach(function(d){
    var btn=document.createElement('button');btn.className='opt-btn';btn.textContent=d;
    btn.addEventListener('click',function(){
      opts.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');});
      if(d===w.digraph){
        btn.classList.add('correct','bounce');sc++;document.getElementById('sc').textContent=sc;
        wEl.innerHTML=w.word.replace(w.digraph,'<span class="digraph-hl">'+w.digraph+'</span>').toUpperCase();
        document.getElementById('fb').textContent='✓ The digraph is "'+w.digraph+'"!';document.getElementById('fb').style.color='var(--success)';
      } else {
        btn.classList.add('wrong','shake');
        document.getElementById('fb').textContent='✗ The digraph is "'+w.digraph+'".';document.getElementById('fb').style.color='var(--error)';
      }
    });opts.appendChild(btn);
  });
  idx++;
}
document.getElementById('next').addEventListener('click',show);show();
</script>
</body>
</html>
