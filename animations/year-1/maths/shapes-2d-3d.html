<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>2D and 3D Shapes — Year 1 Maths | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.shape-grid{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center}
.shape-card{width:100px;height:100px;background:var(--surface2);border:2px solid var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s,transform .2s}
.shape-card:hover{transform:scale(1.06)}
.shape-card.active{border-color:var(--primary)}
.shape-icon{font-size:2rem;margin-bottom:.2rem}
.shape-name{font-size:.75rem;font-weight:700;color:var(--accent)}
.info-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;font-size:.88rem;line-height:1.5;min-height:50px;margin-top:.75rem}
.quiz-area{display:flex;flex-direction:column;gap:1rem}
.q-text{font-size:.95rem;font-weight:600}
.opts{display:flex;flex-direction:column;gap:.4rem}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);text-align:left;transition:background .12s}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:var(--success);color:#0f172a;font-weight:700}
.opt-btn.wrong{background:var(--error);color:#0f172a}
.opt-btn.disabled{pointer-events:none;opacity:.5}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted)}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.88rem;min-height:1.2em;margin-top:.5rem}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 1 · Maths</p>
<h1>2D and 3D Shapes</h1>
<p class="subtitle">Click shapes to learn about them, then take the quiz!</p>
</header>

<div class="card">
<p class="card-title">Shape Explorer</p>
<div class="shape-grid" id="grid"></div>
<div class="info-box" id="info" aria-live="polite">Click a shape to learn about it!</div>
</div>

<div class="card">
<p class="card-title">Shape Quiz</p>
<div class="score-bar">Score: <span id="score">0</span> / <span id="maxS">0</span></div>
<div class="quiz-area" id="quiz"></div>
<p class="fb" id="fb" aria-live="polite"></p>
</div>

<script>
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

var SHAPES=[
{icon:'⬜',name:'Square',desc:'A 2D shape with 4 equal sides and 4 corners. Example: a window!'},
{icon:'🔺',name:'Triangle',desc:'A 2D shape with 3 sides and 3 corners. Example: the roof of a house!'},
{icon:'⭕',name:'Circle',desc:'A 2D shape with no sides and no corners — perfectly round! Example: a clock face.'},
{icon:'📐',name:'Rectangle',desc:'A 2D shape with 4 sides (2 long, 2 short) and 4 corners. Example: a door!'},
{icon:'⚽',name:'Sphere',desc:'A 3D shape like a ball — no faces, no edges, no corners. Example: a football!'},
{icon:'🎲',name:'Cube',desc:'A 3D shape with 6 square faces, 12 edges and 8 corners. Example: a dice!'},
{icon:'🥫',name:'Cylinder',desc:'A 3D shape with 2 circle faces and 1 curved surface. Example: a tin of beans!'},
{icon:'🍦',name:'Cone',desc:'A 3D shape with 1 circle face and 1 curved surface that meets at a point. Example: an ice cream cone!'}
];

var grid=document.getElementById('grid'),infoEl=document.getElementById('info');
SHAPES.forEach(function(s){
  var d=document.createElement('div');d.className='shape-card';
  d.innerHTML='<span class="shape-icon">'+s.icon+'</span><span class="shape-name">'+s.name+'</span>';
  d.addEventListener('click',function(){
    grid.querySelectorAll('.shape-card').forEach(function(c){c.classList.remove('active');});
    d.classList.add('active');
    infoEl.innerHTML='<strong style="color:var(--primary)">'+s.icon+' '+s.name+'</strong><br>'+s.desc;
  });
  grid.appendChild(d);
});

var QUESTIONS=[
{q:'How many sides does a triangle have?',a:'3',d:['4','2','0']},
{q:'Which shape looks like a ball?',a:'Sphere',d:['Cube','Circle','Cylinder']},
{q:'How many corners does a square have?',a:'4',d:['3','2','0']},
{q:'How many faces does a cube have?',a:'6',d:['4','8','2']},
{q:'Which shape has no corners at all?',a:'Circle',d:['Square','Triangle','Rectangle']},
{q:'A tin of beans is which 3D shape?',a:'Cylinder',d:['Cone','Cube','Sphere']}
];
var sc=0,qi=0,qs=shuffle(QUESTIONS).slice(0,5);
var quizEl=document.getElementById('quiz'),fbEl=document.getElementById('fb'),scEl=document.getElementById('score');
document.getElementById('maxS').textContent=qs.length;
function renderQ(){
  if(qi>=qs.length){quizEl.innerHTML='';var p=document.createElement('p');p.className='q-text';p.style.cssText='color:var(--primary);text-align:center';p.textContent='Shape star! '+sc+' / '+qs.length+'!';quizEl.appendChild(p);fbEl.textContent='';return;}
  var q=qs[qi],opts=shuffle([q.a].concat(q.d));quizEl.innerHTML='';fbEl.textContent='';
  var qt=document.createElement('p');qt.className='q-text';qt.textContent=(qi+1)+'. '+q.q;quizEl.appendChild(qt);
  var od=document.createElement('div');od.className='opts';
  opts.forEach(function(o){var btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
    btn.addEventListener('click',function(){od.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');});
    if(o===q.a){btn.classList.add('correct','bounce');sc++;scEl.textContent=sc;fbEl.textContent='✓ Correct!';fbEl.style.color='var(--success)';}
    else{btn.classList.add('wrong','shake');od.querySelectorAll('.opt-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');});fbEl.textContent='✗ Answer: '+q.a;fbEl.style.color='var(--error)';}
    qi++;setTimeout(renderQ,1100);});od.appendChild(btn);});quizEl.appendChild(od);
}
renderQ();
</script>
</body>
</html>
