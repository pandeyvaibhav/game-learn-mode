<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Measurement — Length — Year 1 Maths | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.bar-area{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem}
.bar-row{display:flex;align-items:center;gap:.5rem}
.bar-label{width:60px;font-size:.85rem;text-align:right}
.bar{height:28px;border-radius:6px;display:flex;align-items:center;padding-left:.5rem;font-size:.78rem;font-weight:700;color:#0f172a;transition:width .4s ease}
.num-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.num-btn{min-width:80px;padding:.5rem .8rem;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.88rem;cursor:pointer;text-align:center}
.num-btn:hover{border-color:var(--accent)}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.5rem}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.95rem;min-height:1.2em;margin-top:.5rem;font-weight:600}
.new-btn{display:block;margin:.5rem auto 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem 1rem;color:var(--text);font-size:.85rem;cursor:pointer}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 1 · Maths</p>
<h1>Measurement — Length</h1>
<p class="subtitle">Compare lengths and measure with cubes!</p>
</header>

<div class="card">
<p class="card-title">Which is Longer?</p>
<div class="bar-area" id="bars"></div>
<p style="font-size:.88rem;color:var(--text-muted);text-align:center;margin-bottom:.5rem" id="compQ"></p>
<div class="num-row" id="compOpts"></div>
<p class="fb" id="compFb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="compSc">0</span></div>
<button class="new-btn" id="newComp">New Question</button>
</div>

<div class="card">
<p class="card-title">How Many Cubes Long?</p>
<div id="cubeArea" style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-bottom:.75rem"></div>
<p style="font-size:.88rem;text-align:center;margin-bottom:.5rem" id="cubeQ"></p>
<div class="num-row" id="cubeOpts"></div>
<p class="fb" id="cubeFb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="cubeSc">0</span></div>
<button class="new-btn" id="newCube">New Question</button>
</div>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

/* ── Compare ── */
var ITEMS=['🖍️ Crayon','📏 Ruler','✏️ Pencil','🖊️ Pen','📎 Clip'];
var COLOURS=['#f87171','#38bdf8','#fbbf24','#34d399','#a78bfa'];
var compSc=0;
function newComp(){
  var pick=shuffle(ITEMS).slice(0,2);
  var lenA=rnd(2,8),lenB=rnd(2,8);
  while(lenB===lenA)lenB=rnd(2,8);
  var bars=document.getElementById('bars');bars.innerHTML='';
  [[pick[0],lenA,COLOURS[0]],[pick[1],lenB,COLOURS[1]]].forEach(function(r){
    var row=document.createElement('div');row.className='bar-row';
    row.innerHTML='<span class="bar-label">'+r[0]+'</span><div class="bar" style="width:'+r[1]*40+'px;background:'+r[2]+'">'+r[1]+' cubes</div>';
    bars.appendChild(row);
  });
  document.getElementById('compQ').textContent='Which is longer?';
  var fb=document.getElementById('compFb');fb.textContent='';
  var opts=document.getElementById('compOpts');opts.innerHTML='';
  var ans=lenA>lenB?pick[0]:pick[1];
  shuffle(pick).forEach(function(p){
    var btn=document.createElement('button');btn.className='num-btn';btn.textContent=p;
    btn.addEventListener('click',function(){
      opts.querySelectorAll('.num-btn').forEach(function(b){b.disabled=true;});
      if(p===ans){btn.style.borderColor='var(--success)';btn.classList.add('bounce');compSc++;document.getElementById('compSc').textContent=compSc;fb.textContent='✓ Correct!';fb.style.color='var(--success)';}
      else{btn.style.borderColor='var(--error)';btn.classList.add('shake');fb.textContent='✗ The '+ans+' is longer!';fb.style.color='var(--error)';}
    });opts.appendChild(btn);
  });
}
document.getElementById('newComp').addEventListener('click',newComp);newComp();

/* ── Cube Measuring ── */
var cubeSc=0;
function newCubeQ(){
  var len=rnd(2,10);
  var area=document.getElementById('cubeArea');area.innerHTML='';
  for(var i=0;i<len;i++){var c=document.createElement('div');c.style.cssText='width:28px;height:28px;background:var(--accent);border-radius:4px;border:1px solid rgba(0,0,0,.2)';area.appendChild(c);}
  document.getElementById('cubeQ').textContent='How many cubes long is this?';
  var fb=document.getElementById('cubeFb');fb.textContent='';
  var opts=document.getElementById('cubeOpts');opts.innerHTML='';
  var choices=[len];
  while(choices.length<4){var n=rnd(1,12);if(choices.indexOf(n)===-1)choices.push(n);}
  shuffle(choices).forEach(function(n){
    var btn=document.createElement('button');btn.className='num-btn';btn.textContent=n;
    btn.addEventListener('click',function(){
      opts.querySelectorAll('.num-btn').forEach(function(b){b.disabled=true;});
      if(n===len){btn.style.borderColor='var(--success)';btn.classList.add('bounce');cubeSc++;document.getElementById('cubeSc').textContent=cubeSc;fb.textContent='✓ '+len+' cubes!';fb.style.color='var(--success)';}
      else{btn.style.borderColor='var(--error)';btn.classList.add('shake');fb.textContent='✗ It is '+len+' cubes long.';fb.style.color='var(--error)';}
    });opts.appendChild(btn);
  });
}
document.getElementById('newCube').addEventListener('click',newCubeQ);newCubeQ();
</script>
</body>
</html>
