<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Measurement — Money — Year 2 Maths | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.coins-display{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:.75rem}
.coin{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;background:linear-gradient(135deg,#c9a94e,#a8842a);color:#3a2a00;border:2px solid #d4af37}
.coin.silver{background:linear-gradient(135deg,#b0b8c0,#8a939c);color:#222}
.q-text{font-size:1rem;font-weight:700;text-align:center;margin-bottom:.5rem;color:var(--accent)}
.num-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.9rem;cursor:pointer;color:var(--text);min-width:60px;text-align:center;font-weight:700}
.opt-btn:hover{border-color:var(--accent)}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.5rem}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.95rem;min-height:1.2em;margin-top:.5rem;font-weight:600}
.new-btn{display:block;margin:.5rem auto 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem 1rem;color:var(--text);font-size:.85rem;cursor:pointer}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 2 · Maths</p>
<h1>Measurement — Money</h1>
<p class="subtitle">Add the coins and work out change!</p>
</header>

<div class="card">
<p class="card-title">Money Quiz</p>
<div class="coins-display" id="coins"></div>
<p class="q-text" id="qTxt"></p>
<div class="num-row" id="opts"></div>
<p class="fb" id="fb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="sc">0</span></div>
<button class="new-btn" id="next">Next Question</button>
</div>

<script>
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
var COIN_VALS=[1,2,5,10,20,50];
var sc=0;

function label(v){return v>=100?'£'+(v/100):v+'p';}
function coinClass(v){return v>=20?'coin':'coin silver';}

function newQ(){
  var type=Math.random()<0.6?'add':'change';
  var coinsEl=document.getElementById('coins');coinsEl.innerHTML='';
  var q,ans;
  if(type==='add'){
    var count=Math.floor(Math.random()*3)+2;
    var picked=[];var total=0;
    for(var i=0;i<count;i++){var c=COIN_VALS[Math.floor(Math.random()*COIN_VALS.length)];picked.push(c);total+=c;}
    picked.forEach(function(v){
      var d=document.createElement('div');d.className=coinClass(v);d.textContent=label(v);coinsEl.appendChild(d);
    });
    q='What is the total?';ans=total;
  } else {
    var cost=shuffle([10,15,20,25,30,35,40,45])[0];
    var paid=shuffle([50,100].filter(function(x){return x>cost;}))[0];
    ans=paid-cost;
    q='Item costs '+label(cost)+'. You pay '+label(paid)+'. What change?';
  }
  document.getElementById('qTxt').textContent=q;
  document.getElementById('fb').textContent='';
  var opts=document.getElementById('opts');opts.innerHTML='';
  var choices=new Set([ans]);
  while(choices.size<4){var d=ans+shuffle([-5,-10,5,10,-2,2,1,-1])[0];if(d>0) choices.add(d);}
  shuffle(Array.from(choices)).forEach(function(c){
    var btn=document.createElement('button');btn.className='opt-btn';btn.textContent=label(c);
    btn.addEventListener('click',function(){
      opts.querySelectorAll('.opt-btn').forEach(function(b){b.style.pointerEvents='none';b.style.opacity='.5';});
      btn.style.opacity='1';
      if(c===ans){btn.style.borderColor='var(--success)';btn.classList.add('bounce');sc++;document.getElementById('sc').textContent=sc;document.getElementById('fb').textContent='✓ '+label(ans)+'!';document.getElementById('fb').style.color='var(--success)';}
      else{btn.style.borderColor='var(--error)';btn.classList.add('shake');document.getElementById('fb').textContent='✗ Answer: '+label(ans);document.getElementById('fb').style.color='var(--error)';}
    });opts.appendChild(btn);
  });
}
document.getElementById('next').addEventListener('click',newQ);newQ();
</script>
</body>
</html>
