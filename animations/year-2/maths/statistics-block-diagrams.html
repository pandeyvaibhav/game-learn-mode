<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Statistics — Block Diagrams — Year 2 Maths | Game Learn</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#273344;--border:rgba(148,163,184,.15);--primary:#fbbf24;--accent:#38bdf8;--success:#34d399;--error:#f87171;--text:#e2e8f0;--text-muted:#94a3b8;--radius:16px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;gap:1.5rem}
header{text-align:center;max-width:640px;width:100%}
.tag{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--primary)}
.subtitle{color:var(--text-muted);font-size:.9rem;margin-top:.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px}
.card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.chart{display:flex;align-items:flex-end;gap:.6rem;justify-content:center;height:160px;margin-bottom:.5rem;padding:0 .5rem}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:.2rem}
.bar{width:40px;border-radius:6px 6px 0 0;transition:height .4s}
.bar-label{font-size:.75rem;color:var(--text-muted)}
.bar-val{font-size:.75rem;font-weight:700;color:var(--primary)}
.q-text{font-size:.95rem;font-weight:600;text-align:center;margin-bottom:.5rem}
.num-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.88rem;cursor:pointer;color:var(--text);min-width:60px;text-align:center;font-weight:700}
.opt-btn:hover{border-color:var(--accent)}
.score-bar{text-align:center;font-size:.9rem;color:var(--text-muted);margin-top:.5rem}.score-bar span{color:var(--primary);font-weight:700}
.fb{text-align:center;font-size:.95rem;min-height:1.2em;margin-top:.5rem;font-weight:600}
.new-btn{display:block;margin:.5rem auto 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.4rem 1rem;color:var(--text);font-size:.85rem;cursor:pointer}
@media(prefers-reduced-motion:no-preference){.bounce{animation:bounce .4s ease}.shake{animation:shake .35s ease}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<header>
<p class="tag">Year 2 · Maths</p>
<h1>Statistics — Block Diagrams</h1>
<p class="subtitle">Read the chart and answer the question!</p>
</header>

<div class="card">
<p class="card-title">Block Diagram Quiz</p>
<div class="chart" id="chart"></div>
<p class="q-text" id="qTxt"></p>
<div class="num-row" id="opts"></div>
<p class="fb" id="fb" aria-live="polite"></p>
<div class="score-bar">Score: <span id="sc">0</span></div>
<button class="new-btn" id="next">New Chart</button>
</div>

<script>
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
var COLORS=['#fbbf24','#38bdf8','#a78bfa','#34d399','#f87171'];
var THEMES=[
{title:'Favourite Fruit',items:['Apple','Banana','Grape','Orange']},
{title:'Favourite Pet',items:['Dog','Cat','Fish','Rabbit']},
{title:'Favourite Colour',items:['Red','Blue','Green','Yellow']},
{title:'Favourite Sport',items:['Football','Swimming','Tennis','Running']}
];
var sc=0;

function newQ(){
  var theme=THEMES[Math.floor(Math.random()*THEMES.length)];
  var data=theme.items.map(function(item,i){return{name:item,val:Math.floor(Math.random()*8)+1,color:COLORS[i]};});
  var maxVal=Math.max.apply(null,data.map(function(d){return d.val;}));
  var chart=document.getElementById('chart');chart.innerHTML='';
  data.forEach(function(d){
    var wrap=document.createElement('div');wrap.className='bar-wrap';
    var bar=document.createElement('div');bar.className='bar';bar.style.height=(d.val/maxVal*120)+'px';bar.style.background=d.color;
    var val=document.createElement('div');val.className='bar-val';val.textContent=d.val;
    var lbl=document.createElement('div');lbl.className='bar-label';lbl.textContent=d.name;
    wrap.appendChild(val);wrap.appendChild(bar);wrap.appendChild(lbl);chart.appendChild(wrap);
  });
  // Question
  var qType=shuffle(['most','least','howmany','total'])[0];
  var q,ans;
  if(qType==='most'){
    var mx=data.reduce(function(a,b){return a.val>b.val?a:b;});
    q='Which is the most popular?';ans=mx.name;
  } else if(qType==='least'){
    var mn=data.reduce(function(a,b){return a.val<b.val?a:b;});
    q='Which is the least popular?';ans=mn.name;
  } else if(qType==='howmany'){
    var pick=data[Math.floor(Math.random()*data.length)];
    q='How many chose '+pick.name+'?';ans=String(pick.val);
  } else {
    var tot=data.reduce(function(s,d){return s+d.val;},0);
    q='How many altogether?';ans=String(tot);
  }
  document.getElementById('qTxt').textContent=q;
  document.getElementById('fb').textContent='';
  var opts=document.getElementById('opts');opts.innerHTML='';
  var choices;
  if(qType==='most'||qType==='least'){
    choices=data.map(function(d){return d.name;});
  } else {
    choices=[ans];
    while(choices.length<4){var d=parseInt(ans)+shuffle([-2,-1,1,2,3,-3])[0];if(d>0&&choices.indexOf(String(d))===-1) choices.push(String(d));}
  }
  shuffle(choices).forEach(function(c){
    var btn=document.createElement('button');btn.className='opt-btn';btn.textContent=c;
    btn.addEventListener('click',function(){
      opts.querySelectorAll('.opt-btn').forEach(function(b){b.style.pointerEvents='none';b.style.opacity='.5';});
      btn.style.opacity='1';
      if(c===ans){btn.style.borderColor='var(--success)';btn.classList.add('bounce');sc++;document.getElementById('sc').textContent=sc;document.getElementById('fb').textContent='✓ '+ans+'!';document.getElementById('fb').style.color='var(--success)';}
      else{btn.style.borderColor='var(--error)';btn.classList.add('shake');document.getElementById('fb').textContent='✗ Answer: '+ans;document.getElementById('fb').style.color='var(--error)';}
    });opts.appendChild(btn);
  });
}
document.getElementById('next').addEventListener('click',newQ);newQ();
</script>
</body>
</html>
